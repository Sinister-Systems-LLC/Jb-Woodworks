<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Sinister Sanctum :: Login</title>
    <link rel="icon" href="/static/sinister-logo.png" type="image/png">
    <link rel="stylesheet" href="/static/theme.css">
    <style>
        body { display:flex; align-items:center; justify-content:center; height:100vh; }
        .login-card {
            max-width: 380px;
            width: 100%;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 28px 26px;
            box-shadow: var(--inset-bloom), var(--glow);
            text-align: center;
        }
        .login-card img.logo {
            width: 96px;
            height: 96px;
            margin-bottom: 14px;
            filter: drop-shadow(0 0 14px rgba(122, 61, 212, 0.55));
        }
        .login-card h1 {
            font-size: 14px;
            letter-spacing: 3px;
            margin: 0 0 6px 0;
            color: var(--text);
        }
        .login-card h1 .accent { color: var(--primary-soft); }
        .login-card p.sub {
            color: var(--muted);
            font-size: 12px;
            margin: 0 0 18px 0;
            font-family: var(--mono);
        }
        .login-card input[type="password"] {
            width: 100%;
            background: var(--bg-alt);
            border: 1px solid var(--card-border);
            color: var(--text);
            padding: 12px 14px;
            border-radius: 8px;
            font-family: var(--mono);
            font-size: 13px;
            letter-spacing: 1px;
            text-align: center;
        }
        .login-card input[type="password"]:focus {
            outline: none;
            border-color: var(--primary-soft);
            box-shadow: 0 0 0 3px rgba(160, 110, 255, 0.18);
        }
        .login-card button {
            width: 100%;
            margin-top: 14px;
            background: var(--primary);
            color: white;
            border: 0;
            padding: 12px;
            border-radius: 8px;
            font-family: var(--mono);
            font-size: 12px;
            letter-spacing: 3px;
            cursor: pointer;
            transition: background 120ms ease;
        }
        .login-card button:hover { background: var(--primary-soft); }
        .login-card button:disabled { opacity: 0.5; cursor: wait; }
        .login-card .hint {
            color: var(--dim);
            font-size: 10px;
            font-family: var(--mono);
            margin-top: 18px;
            line-height: 1.6;
        }
        .login-card .err {
            color: var(--danger);
            font-size: 11px;
            margin-top: 10px;
            min-height: 1.2em;
        }
        .hwid-line {
            color: var(--muted);
            font-size: 9px;
            font-family: var(--mono);
            margin-top: 14px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <form class="login-card" id="login-form" autocomplete="off">
        <img class="logo" src="/static/sinister-logo.png" alt="Sinister Sanctum">
        <h1>SINISTER SANCTUM <span class="accent">::</span> CONSOLE</h1>
        <p class="sub">enter auth key to continue</p>
        <input type="password" id="auth-key" placeholder="paste your auth key" autofocus autocomplete="off">
        <button type="submit" id="login-btn">UNLOCK</button>
        <div class="err" id="err-msg"></div>
        <div class="hint">
            keys are HWID-locked to the machine on first use.<br>
            no usernames. operator + leo each get one key.
        </div>
        <div class="hwid-line" id="hwid-line">hwid: ...</div>
    </form>

    <script>
        // Show this machine's HWID (informational)
        fetch('/api/auth/whoami', { credentials: 'include' })
            .then(r => r.json())
            .then(j => {
                if (j.hwid) document.getElementById('hwid-line').textContent = 'hwid: ' + j.hwid;
                if (j.ok) {
                    // Already authenticated; bounce to /
                    window.location.href = '/';
                }
            })
            .catch(() => {});

        document.getElementById('login-form').addEventListener('submit', async (ev) => {
            ev.preventDefault();
            const key = document.getElementById('auth-key').value.trim();
            const errEl = document.getElementById('err-msg');
            const btn = document.getElementById('login-btn');
            errEl.textContent = '';
            if (!key) { errEl.textContent = 'enter a key first.'; return; }
            btn.disabled = true; btn.textContent = 'AUTHENTICATING...';
            try {
                const r = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ key }),
                });
                const j = await r.json();
                if (r.ok && j.ok) {
                    try { localStorage.setItem('sinister_token', j.token); } catch (e) {}
                    window.location.href = '/';
                } else {
                    errEl.textContent = (j.detail || j.error || 'login failed');
                    btn.disabled = false;
                    btn.textContent = 'UNLOCK';
                }
            } catch (e) {
                errEl.textContent = 'network error: ' + e.message;
                btn.disabled = false;
                btn.textContent = 'UNLOCK';
            }
        });
    </script>
</body>
</html>
