<!-- Author: Sinister Sanctum master agent (Claude) :: 2026-05-19 -->
<!-- Author: Sinister Sanctum master agent (Claude UI-redesign sub) :: 2026-05-19 — workstation sweep -->
<!-- Two-tab workstation shell — ADB DEVICES + AGENTS — complex 3-row header.   -->
<!-- Per operator feedback (2026-05-19 21:00Z): "I want one tab for agents and  -->
<!-- creating and managing agents and all my features and ideas for that and    -->
<!-- the adb side of things to view the phones". UI doctrine: Sanctum purple    -->
<!-- (#7A3DD4), Liquid Glass primitives (.lg-* / lg-card-hero), motion vars     -->
<!-- 150/300/600ms with cubic-bezier(0.22, 1, 0.36, 1).                         -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>RKOJ :: Workstation</title>
    <link rel="icon" href="/static/sinister-logo.png">
    <link rel="stylesheet" href="/static/tokens.css">
    <link rel="stylesheet" href="/static/theme.css">
</head>
<body data-density="cozy">
    <!-- ===== RKOJ Workstation shell — 2 tabs, 3-row header ===== -->
    <div class="rkoj-workstation">

        <!-- ============ HEADER (3 rows) ============ -->
        <header class="rkoj-header">

            <!-- ===== Row 1: identity + tabs + icon strip ===== -->
            <div class="rkoj-header-row rkoj-header-row-1">
                <div class="rkoj-brand">
                    <img src="/static/skull.svg" class="rkoj-brand-skull" alt="Sanctum skull">
                    <div class="rkoj-brand-text">
                        <span class="rkoj-brand-wordmark">RKOJ</span>
                        <span class="rkoj-brand-sub">WORKSTATION</span>
                    </div>
                </div>

                <nav class="rkoj-tabs" role="tablist">
                    <button class="lg-pill rkoj-tab active" role="tab" data-tab="adb" aria-selected="true">
                        <span class="rkoj-tab-ico" aria-hidden="true">&#9744;</span>
                        <span class="rkoj-tab-label">ADB DEVICES</span>
                        <span class="rkoj-tab-count" data-bind="tab-adb-count">0</span>
                    </button>
                    <button class="lg-pill rkoj-tab" role="tab" data-tab="agents" aria-selected="false">
                        <span class="rkoj-tab-ico" aria-hidden="true">&#9881;</span>
                        <span class="rkoj-tab-label">AGENTS</span>
                        <span class="rkoj-tab-count" data-bind="tab-agents-count">0</span>
                    </button>
                </nav>

                <div class="rkoj-header-icons">
                    <button class="rkoj-icon-pill" id="hdr-alerts" title="Pending operator requests" aria-label="Pending operator requests">
                        <span class="rkoj-icon-pill-glyph">!</span>
                        <span class="rkoj-icon-pill-badge danger" id="alerts-count"></span>
                    </button>
                    <button class="rkoj-icon-pill" id="hdr-bell" title="Cross-agent inbox notifications" aria-label="Notifications">
                        <span class="rkoj-icon-pill-glyph">&#9788;</span>
                        <span class="rkoj-icon-pill-badge accent" id="inbox-count"></span>
                    </button>
                    <button class="rkoj-icon-pill rkoj-icon-pill-wide" id="hdr-palette" title="Command palette (Ctrl+K)">
                        <span class="rkoj-icon-pill-glyph">&#8984;</span>
                        <span class="rkoj-icon-pill-text">Search</span>
                        <span class="rkoj-icon-pill-kbd">K</span>
                    </button>
                    <button class="codex-status-pill" id="codex-status-pill" title="latest Codex verdict (click to open pane)">
                        <span class="codex-status-dot"></span>
                        <span class="codex-status-text" id="codex-status-text">Codex</span>
                        <span class="codex-status-age" id="codex-status-age">--</span>
                    </button>
                    <span class="rkoj-health-pill lg-pill" id="health-pill" title="server health">&#9679; online</span>
                    <button class="rkoj-icon-pill rkoj-icon-pill-wide" id="hdr-newwin" title="Open a new popout window">
                        <span class="rkoj-icon-pill-glyph">&#43;</span>
                        <span class="rkoj-icon-pill-text">Window</span>
                    </button>
                    <button class="rkoj-icon-pill" id="hdr-settings" title="Settings drawer" aria-label="Settings">
                        <span class="rkoj-icon-pill-glyph">&#9881;</span>
                    </button>
                    <span class="rkoj-clock" id="clock">--:--</span>
                </div>
            </div>

            <!-- ===== Row 2: Excel-style action ribbon ===== -->
            <div class="rkoj-header-row rkoj-header-row-2" id="rkoj-ribbon">
                <!-- Built by app.js renderHeaderRibbon() — 5 groups: VIEW / SPAWN / AGENT / AUTOMATE / MAINTAIN -->
            </div>

            <!-- ===== Row 3: Hero KPI strip ===== -->
            <div class="rkoj-header-row rkoj-header-row-3">
                <button class="rkoj-kpi lg-card" id="kpi-card-phones" title="Open ADB devices tab">
                    <div class="rkoj-kpi-head">
                        <span class="rkoj-kpi-label">PHONES ONLINE</span>
                        <span class="rkoj-kpi-ico" aria-hidden="true">&#9742;</span>
                    </div>
                    <div class="rkoj-kpi-num" data-bind="kpi-phones-online">&mdash;</div>
                    <div class="rkoj-kpi-sub" data-bind="kpi-phones-sub">--</div>
                </button>
                <button class="rkoj-kpi lg-card" id="kpi-card-agents" title="Open agents tab">
                    <div class="rkoj-kpi-head">
                        <span class="rkoj-kpi-label">AGENTS ONLINE</span>
                        <span class="rkoj-kpi-ico" aria-hidden="true">&#9881;</span>
                    </div>
                    <div class="rkoj-kpi-num" data-bind="kpi-agents-online">&mdash;</div>
                    <div class="rkoj-kpi-sub" data-bind="kpi-agents-sub">--</div>
                </button>
                <button class="rkoj-kpi lg-card" id="kpi-card-vault" title="Open vault drawer">
                    <div class="rkoj-kpi-head">
                        <span class="rkoj-kpi-label">VAULT USED</span>
                        <span class="rkoj-kpi-ico" aria-hidden="true">&#9776;</span>
                    </div>
                    <div class="rkoj-kpi-num" data-bind="kpi-vault-used">&mdash;</div>
                    <div class="rkoj-kpi-sub" data-bind="kpi-vault-sub">--</div>
                </button>
                <button class="rkoj-kpi lg-card" id="kpi-card-pending" title="Open operator requests">
                    <div class="rkoj-kpi-head">
                        <span class="rkoj-kpi-label">PENDING REQUESTS</span>
                        <span class="rkoj-kpi-ico" aria-hidden="true">!</span>
                    </div>
                    <div class="rkoj-kpi-num" data-bind="kpi-pending">&mdash;</div>
                    <div class="rkoj-kpi-sub" data-bind="kpi-pending-sub">--</div>
                </button>
            </div>
        </header>

        <!-- ============ TAB CONTENT (2 panes) ============ -->
        <main class="rkoj-tab-content">
            <section class="rkoj-tab-pane" id="skel-adb">
                <!-- ADB phone-viewer surface (built by mountAdbTab) -->
            </section>
            <section class="rkoj-tab-pane" id="skel-agents" hidden>
                <!-- Agents workstation (built by mountAgentsTab) -->
            </section>
        </main>
    </div>

    <!-- ===== SPAWNED-WINDOWS control bar (per-agent chips) ===== -->
    <div class="windows-bar" id="windows-bar"><span class="hint" style="margin:0;">no Claude windows tracked yet</span></div>

    <!-- ===== Dev-tools rail (preserved — palette / templates mount target) ===== -->
    <aside class="rkoj-devtools" id="devtools-rail" aria-hidden="true">
        <header class="rkoj-devtools-header">
            <h3>Dev tools</h3>
            <button class="rkoj-icon-btn" id="devtools-close">&#10005;</button>
        </header>
        <div class="rkoj-devtools-body" id="devtools-body"></div>
    </aside>

    <!-- ===== Popouts list (small floating chip strip) ===== -->
    <div class="rkoj-popouts-bar" id="popouts-bar" hidden></div>

    <!-- ===== Toast container ===== -->
    <div class="rkoj-toasts" id="toasts"></div>
    <!-- Legacy single-toast slot (kept for app.js toast() helper which targets #toast) -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <!-- ============================================================ -->
    <!-- TEMPLATES (preserved verbatim from prior shell + new ones)    -->
    <!-- ============================================================ -->

    <!-- ===== NEW: agents workstation template (operator workstation layout) ===== -->
    <template id="tpl-agents-workstation">
        <div class="rkoj-agents-workstation">

            <!-- HERO: launcher wizard (always visible) -->
            <section class="lg-card-hero rkoj-launcher-hero" data-bind="launcher-hero">
                <div class="rkoj-launcher-hero-head">
                    <h2>Spawn a new agent</h2>
                    <span class="muted">launch any project in any mode :: powered by /api/launcher/spawn</span>
                </div>
                <div class="rkoj-launcher-hero-body">
                    <div class="rkoj-launcher-col">
                        <label class="rkoj-launcher-row">
                            <span class="rkoj-launcher-label">Project</span>
                            <select class="lg-input" data-bind="lh-project"></select>
                        </label>
                        <label class="rkoj-launcher-row">
                            <span class="rkoj-launcher-label">Mode</span>
                            <div class="rkoj-launcher-modes" data-bind="lh-mode-chips">
                                <!-- mode chips injected by app.js -->
                            </div>
                            <select class="lg-input" data-bind="lh-mode" hidden></select>
                        </label>
                        <label class="rkoj-launcher-row rkoj-launcher-fast">
                            <span class="rkoj-launcher-label">Fast mode</span>
                            <span class="rkoj-launcher-toggle">
                                <input type="checkbox" data-bind="lh-fast">
                                <span class="rkoj-launcher-toggle-text">Use Opus 4.6 (fast) instead of Opus 4.7 (smartest)</span>
                            </span>
                        </label>
                    </div>
                    <div class="rkoj-launcher-col">
                        <label class="rkoj-launcher-row rkoj-launcher-prompt">
                            <span class="rkoj-launcher-label">Custom prompt (optional)</span>
                            <textarea class="lg-input" data-bind="lh-prompt" rows="3" placeholder="optional: tell the agent what to focus on after spawn..."></textarea>
                        </label>
                        <div class="rkoj-launcher-actions">
                            <button class="lg-button primary rkoj-launch-btn" data-act="launch">
                                <span class="rkoj-launch-ico">&#9889;</span>
                                <span>LAUNCH</span>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="rkoj-recent-launches" data-bind="recent-launches-strip">
                    <!-- last 5 mini-cards injected by app.js -->
                </div>
            </section>

            <!-- TWO-COLUMN GRID: sessions + activity (left 60%) / cycle-points + schedule + codex (right 40%) -->
            <section class="rkoj-workbench-grid">
                <div class="rkoj-workbench-col rkoj-workbench-col-left">
                    <div class="lg-card rkoj-sessions-card">
                        <header class="rkoj-card-head">
                            <h3>Active sessions</h3>
                            <span class="count" data-bind="agents-sessions-count">0 online</span>
                        </header>
                        <div class="rkoj-sessions-grid" data-bind="agents-sessions-grid">
                            <div class="empty-note">loading sessions...</div>
                        </div>
                    </div>
                    <div class="lg-card rkoj-activity-card">
                        <header class="rkoj-card-head">
                            <h3>Activity feed</h3>
                            <span class="count" data-bind="activity-count">live</span>
                        </header>
                        <div class="rkoj-activity-list" data-bind="activity-feed-list">
                            <div class="empty-note">loading activity...</div>
                        </div>
                    </div>
                </div>
                <div class="rkoj-workbench-col rkoj-workbench-col-right">
                    <div class="lg-card rkoj-cyclepoints-card">
                        <header class="rkoj-card-head">
                            <h3>Cycle points</h3>
                            <button class="lg-button ghost btn-mini" data-act="new-cycle-point">+ NEW</button>
                        </header>
                        <div class="rkoj-cyclepoints-list" data-bind="cycle-points-list">
                            <div class="empty-note">no cycle points yet</div>
                        </div>
                    </div>
                    <div class="lg-card rkoj-schedule-card">
                        <header class="rkoj-card-head">
                            <h3>Schedule</h3>
                            <button class="lg-button ghost btn-mini" data-act="new-schedule">+ NEW</button>
                        </header>
                        <div class="rkoj-schedule-list" data-bind="schedule-list">
                            <div class="empty-note">loading schedule...</div>
                        </div>
                    </div>
                    <div class="lg-card rkoj-codex-card">
                        <header class="rkoj-card-head">
                            <h3>Codex reviews</h3>
                            <button class="lg-button ghost btn-mini" data-act="open-codex">OPEN</button>
                        </header>
                        <div class="rkoj-codex-summary" data-bind="codex-summary-list">
                            <div class="empty-note">no recent reviews</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- TILE SHELF: 5 secondary feature tiles -->
            <section class="rkoj-tile-shelf">
                <button class="lg-card rkoj-tile" data-tile="knowledge">
                    <div class="rkoj-tile-head">
                        <span class="rkoj-tile-ico">&#9776;</span>
                        <span class="rkoj-tile-title">KNOWLEDGE</span>
                    </div>
                    <div class="rkoj-tile-body">
                        <div class="rkoj-tile-num" data-bind="tile-knowledge-count">--</div>
                        <div class="rkoj-tile-sub">brain topics</div>
                    </div>
                </button>
                <button class="lg-card rkoj-tile" data-tile="vault">
                    <div class="rkoj-tile-head">
                        <span class="rkoj-tile-ico">V</span>
                        <span class="rkoj-tile-title">VAULT</span>
                    </div>
                    <div class="rkoj-tile-body">
                        <div class="rkoj-tile-num" data-bind="tile-vault-used">--</div>
                        <div class="rkoj-tile-sub" data-bind="tile-vault-last">--</div>
                    </div>
                </button>
                <button class="lg-card rkoj-tile" data-tile="progress">
                    <div class="rkoj-tile-head">
                        <span class="rkoj-tile-ico">&#9650;</span>
                        <span class="rkoj-tile-title">PROGRESS</span>
                    </div>
                    <div class="rkoj-tile-body">
                        <div class="rkoj-tile-num" data-bind="tile-progress-count">--</div>
                        <div class="rkoj-tile-sub" data-bind="tile-progress-last">--</div>
                    </div>
                </button>
                <button class="lg-card rkoj-tile" data-tile="catalog">
                    <div class="rkoj-tile-head">
                        <span class="rkoj-tile-ico">&#9635;</span>
                        <span class="rkoj-tile-title">SKILLS / TOOLS / INVENTIONS</span>
                    </div>
                    <div class="rkoj-tile-body">
                        <div class="rkoj-tile-num" data-bind="tile-catalog-count">--</div>
                        <div class="rkoj-tile-sub">combined</div>
                    </div>
                </button>
                <button class="lg-card rkoj-tile" data-tile="daemons">
                    <div class="rkoj-tile-head">
                        <span class="rkoj-tile-ico">&#9788;</span>
                        <span class="rkoj-tile-title">DAEMONS</span>
                    </div>
                    <div class="rkoj-tile-body">
                        <div class="rkoj-tile-dots" data-bind="tile-daemons-dots">
                            <span class="rkoj-daemon-dot" data-daemon="sanctum-console" title="sanctum-console"></span>
                            <span class="rkoj-daemon-dot" data-daemon="sinister-vault" title="sinister-vault"></span>
                            <span class="rkoj-daemon-dot" data-daemon="rkoj" title="rkoj"></span>
                        </div>
                        <div class="rkoj-tile-sub">heartbeats</div>
                    </div>
                </button>
            </section>
        </div>
    </template>

    <!-- ===== NEW: ADB phone-viewer template (operator phone surface) ===== -->
    <template id="tpl-adb-workstation">
        <div class="rkoj-adb-workstation">
            <!-- Sticky lane filter + bulk actions row -->
            <section class="lg-card rkoj-adb-toolbar">
                <div class="rkoj-adb-lanes" data-bind="adb-lane-chips">
                    <!-- lane chips injected -->
                </div>
                <div class="rkoj-adb-toolbar-spacer"></div>
                <div class="rkoj-adb-toolbar-actions">
                    <button class="lg-button" data-act="scan-all">Scan all</button>
                    <button class="lg-button ghost" data-act="push-to-lane">Push file to lane</button>
                    <button class="lg-button ghost" data-act="push-frida">Push frida to lane</button>
                    <button class="lg-button ghost" data-act="reboot-selected">Reboot selected</button>
                </div>
                <div class="rkoj-adb-toolbar-count">
                    <span class="count" data-bind="adb-count">0 attached</span>
                    <button class="lg-button ghost btn-mini" data-act="refresh">refresh</button>
                </div>
            </section>

            <!-- Device grid -->
            <section class="rkoj-adb-grid" data-bind="adb-grid">
                <div class="empty-note">loading devices...</div>
            </section>

            <!-- Recent ADB events feed -->
            <section class="lg-card rkoj-adb-events">
                <header class="rkoj-card-head">
                    <h3>Recent ADB events</h3>
                    <span class="count">most recent first &middot; local only</span>
                </header>
                <div class="rkoj-adb-events-list" data-bind="adb-events-list">
                    <div class="empty-note">no events yet &mdash; run a command on a device card to populate this feed</div>
                </div>
            </section>
        </div>
    </template>

    <!-- ===== Window-picker popover (header "+ Window" button) ===== -->
    <template id="tpl-newwin-picker">
        <div class="lg-popover rkoj-newwin-picker" role="dialog" aria-modal="true" aria-label="new window picker">
            <h4>Open a new popout window</h4>
            <div class="rkoj-newwin-grid">
                <button class="lg-button rkoj-newwin-tile" data-view="dashboard">Dashboard</button>
                <button class="lg-button rkoj-newwin-tile" data-view="phones">Phones</button>
                <button class="lg-button rkoj-newwin-tile" data-view="agents">Agents</button>
                <button class="lg-button rkoj-newwin-tile" data-view="cycle-points">Cycle points</button>
                <button class="lg-button rkoj-newwin-tile" data-view="codex">Codex</button>
                <button class="lg-button rkoj-newwin-tile" data-view="inbox">Inbox</button>
                <button class="lg-button rkoj-newwin-tile" data-view="schedule">Schedule</button>
                <button class="lg-button rkoj-newwin-tile" data-view="vault">Vault</button>
            </div>
            <div class="popover-actions">
                <button class="lg-button ghost" data-act="cancel">Cancel</button>
            </div>
        </div>
    </template>

    <!-- ===== Settings drawer (header cog) ===== -->
    <template id="tpl-settings-drawer">
        <div class="lg-popover rkoj-settings-drawer" role="dialog" aria-modal="true" aria-label="settings">
            <h4>Workstation settings</h4>
            <label>Density
                <select class="lg-input" data-bind="set-density">
                    <option value="compact">compact</option>
                    <option value="cozy" selected>cozy</option>
                    <option value="comfortable">comfortable</option>
                </select>
            </label>
            <label>Hot reload
                <span class="rkoj-launcher-toggle">
                    <input type="checkbox" data-bind="set-hotreload" checked>
                    <span>SSE channel /api/sse/changes</span>
                </span>
            </label>
            <label>Default intelligence
                <select class="lg-input" data-bind="set-intel">
                    <option value="claude-opus-4-7">Opus 4.7 (smartest)</option>
                    <option value="claude-opus-4-6">Opus 4.6 (fast)</option>
                    <option value="claude-sonnet-4-6">Sonnet 4.6 (balanced)</option>
                    <option value="claude-haiku-4-5-20251001">Haiku 4.5 (fastest)</option>
                </select>
            </label>
            <button class="lg-button" data-act="open-devtools">Open dev tools rail</button>
            <button class="lg-button" data-act="open-accounts">Anthropic accounts</button>
            <button class="lg-button danger" data-act="signout">Sign out</button>
            <div class="popover-actions">
                <button class="lg-button ghost" data-act="cancel">Close</button>
            </div>
        </div>
    </template>

    <!-- ===== Per-device command + actions popover ===== -->
    <template id="tpl-device-actions-popover">
        <div class="lg-popover rkoj-device-actions" role="dialog" aria-modal="true" aria-label="device actions">
            <h4 data-bind="da-title">Device actions</h4>
            <div class="rkoj-device-actions-grid">
                <button class="lg-button" data-act="push-file">Push file</button>
                <button class="lg-button" data-act="push-frida">Push frida</button>
                <button class="lg-button" data-act="set-proxy">Settings proxy</button>
                <button class="lg-button" data-act="shell-dump">Shell dump</button>
                <button class="lg-button" data-act="view-logs">View logs</button>
                <button class="lg-button" data-act="reboot">Reboot</button>
            </div>
            <div class="popover-actions">
                <button class="lg-button ghost" data-act="cancel">Close</button>
            </div>
        </div>
    </template>

    <!-- ============ LEGACY TEMPLATES (preserved verbatim) ============ -->
    <!-- Consumed by dev-tools rail drawers, command palette mount, popouts. -->

    <template id="tpl-devices-section">
        <div class="rkoj-devices-section">
            <div class="lane-filter-bar">
                <label>filter by lane:</label>
                <select data-bind="devices-lane-filter">
                    <option value="">all</option>
                </select>
                <span class="lane-legend" data-bind="devices-lane-legend"></span>
                <span class="count" data-bind="devices-count">0 attached</span>
                <button class="lg-button ghost" data-act="refresh-devices" data-bind="devices-refresh">refresh</button>
            </div>
            <div class="rkoj-devices-grid" data-bind="devices-grid">
                <div class="empty-note">loading devices...</div>
            </div>
        </div>
    </template>

    <template id="tpl-agents-section">
        <div class="rkoj-agents-section">
            <section class="rkoj-sessions-strip" data-bind="agents-sessions-strip">
                <h4>Active sessions <span class="count" data-bind="agents-sessions-count">0</span></h4>
                <div class="rkoj-sessions-grid" data-bind="agents-sessions-grid">
                    <div class="empty-note">loading sessions...</div>
                </div>
            </section>
            <section class="rkoj-launcher-wizard lg-card">
                <h4>Spawn a new agent session</h4>
                <div class="lh-row"><label>Project</label><select data-bind="lh-project"></select></div>
                <div class="lh-row"><label>Mode</label><select data-bind="lh-mode"></select></div>
                <div class="lh-row"><label><input type="checkbox" data-bind="lh-fast"> Fast mode (Opus 4.6 only)</label></div>
                <div class="lh-row"><label>Custom prompt (optional)</label><textarea data-bind="lh-prompt" class="lg-textarea" placeholder="injected after spawn"></textarea></div>
                <div class="lh-actions">
                    <button class="lg-button primary" data-act="launch">[LAUNCH]</button>
                    <button class="lg-button ghost" data-act="fix-claude-memory">FIX CLAUDE MEMORY</button>
                    <button class="lg-button ghost" data-act="open-trophy">OPEN TROPHY CASE</button>
                    <button class="lg-button ghost" data-act="open-phones">OPEN PHONE VIEWER</button>
                </div>
            </section>
            <section class="rkoj-recent-launches lg-card" data-bind="recent-launches-card">
                <h4>Recent launches <span class="count" data-bind="lh-recent-count">0</span></h4>
                <div data-bind="recent-launches-list" class="recent-launches">
                    <div class="empty-note">no launches yet</div>
                </div>
            </section>

        <label>File path (absolute)<input class="lg-input" data-bind="vc-file" placeholder="D:\Sinister Sanctum\...\some-file.md"></label>
        <label>Commit message<input class="lg-input" data-bind="vc-message" placeholder="add: design note"></label>
        <label>Account<select class="lg-select" data-bind="vc-account"><option value="operator">operator</option><option value="leo">leo</option></select></label>
        <div class="popover-actions">
          <button class="lg-button ghost" data-act="cancel">Cancel</button>
          <button class="lg-button primary" data-act="save">Commit</button>
        </div>
      </div>
    </template>

    <!-- Codex fullpane template — Sinister Sanctum master agent (Claude) :: 2026-05-19 -->
    <!-- Reachable via header ribbon ('Codex review' AGENT group), Cmd+K palette
         ('codex: open pane'), agents tab Codex card 'OPEN' button, or hash route #pane=codex. -->
    <template id="tpl-codex-fullpane">
        <div class="codex-fullpane">
            <!-- Hero card -->
            <div class="codex-hero">
                <div class="codex-hero-row">
                    <div class="codex-hero-title">
                        <span class="codex-shield" aria-hidden="true">
                            <!-- shield-check inline SVG (no lucide-react) -->
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 2 4 5v6c0 5.25 3.4 9.9 8 11 4.6-1.1 8-5.75 8-11V5l-8-3z"/>
                                <path d="m9 12 2 2 4-4"/>
                            </svg>
                        </span>
                        Codex Companion
                    </div>
                    <span class="codex-verdict-pill unknown" data-bind="codex-hero-verdict">No reviews yet</span>
                </div>
                <div class="codex-hero-tagline">
                    Peer-review counterweight from a different model family. POST code -&gt; get a verdict (pass / warn / fail) with findings.
                    Backend: <code>tools/codex-companion/codex.py</code>. JSON audit log lives in <code>_shared-memory/codex-reviews/</code>.
                </div>
                <div class="codex-hero-meta">
                    <code>POST /api/codex/review</code>
                    <code>GET /api/codex/reviews</code>
                    <span>Sanctum purple master surface.</span>
                </div>
            </div>

            <!-- Two-column grid: history (left) + run-review form (right) -->
            <div class="codex-grid">
                <!-- ===== Recent reviews ===== -->
                <section class="lg-card codex-card">
                    <div class="codex-card-head">
                        <h3>Recent reviews</h3>
                        <span class="count" data-bind="codex-pane-history-count">0</span>
                    </div>
                    <div class="codex-reviews-list" data-bind="codex-pane-history">
                        <div class="empty-note">loading recent reviews...</div>
                    </div>
                </section>

                <!-- ===== Run a review ===== -->
                <section class="lg-card codex-card">
                    <div class="codex-card-head">
                        <h3>Run Codex review</h3>
                        <span class="count" data-bind="codex-pane-status">ready</span>
                    </div>
                    <div data-bind="codex-pane-form">
                        <div class="codex-form-row">
                            <label for="codex-pane-content">Content (paste code or diff)</label>
                            <textarea id="codex-pane-content" class="codex-content" data-bind="codex-pane-content" rows="9" placeholder="paste code or git-diff to review..."></textarea>
                        </div>
                        <div class="codex-form-row">
                            <label for="codex-pane-context">Context (one-line blurb)</label>
                            <input id="codex-pane-context" class="lg-input" data-bind="codex-pane-context" type="text" placeholder="why we're reviewing this (optional)">
                        </div>
                        <div class="codex-controls-row">
                            <div class="codex-form-row" style="min-width: 160px;">
                                <label for="codex-pane-language">Language</label>
                                <select id="codex-pane-language" class="lg-input" data-bind="codex-pane-language">
                                    <option value="python" selected>python</option>
                                    <option value="typescript">typescript</option>
                                    <option value="javascript">javascript</option>
                                    <option value="rust">rust</option>
                                    <option value="go">go</option>
                                    <option value="bash">bash</option>
                                    <option value="powershell">powershell</option>
                                    <option value="markdown">markdown</option>
                                    <option value="auto">auto / other</option>
                                </select>
                            </div>
                            <div class="codex-form-row">
                                <label>Depth</label>
                                <div style="display:flex; gap:6px;">
                                    <label class="codex-depth-radio"><input type="radio" name="codex-depth" value="quick"> quick</label>
                                    <label class="codex-depth-radio"><input type="radio" name="codex-depth" value="standard" checked> standard</label>
                                    <label class="codex-depth-radio"><input type="radio" name="codex-depth" value="deep"> deep</label>
                                </div>
                            </div>
                        </div>
                        <div style="margin-top: 10px; display:flex; gap:8px; align-items:center;">
                            <button class="codex-run-btn" data-bind="codex-pane-submit" type="button">Run Codex review</button>
                            <span class="codex-hero-tagline" data-bind="codex-pane-feedback" style="margin:0;"></span>
                        </div>
                    </div>
                    <div data-bind="codex-pane-nokey" style="display:none;">
                        <div class="codex-no-key">
                            <h4>OPENAI_API_KEY not set</h4>
                            Set the env var on the workstation, then restart the RKOJ console:<br>
                            <code>setx OPENAI_API_KEY "sk-..."</code> &middot; reopen RKOJ.exe.
                            See <code>tools/codex-companion/README.md</code> for full setup.
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </template>

    <script src="/static/popout.js"></script>
    <script src="/static/palette.js"></script>
    <script src="/static/cycle-points.js"></script>
    <script src="/static/scheduler.js"></script>
    <!-- fleet-state.js MUST load before app.js — app.js subscribes to FleetState on init. -->
    <!-- Author: Sinister Sanctum master agent (Claude) :: 2026-05-19 -->
    <script src="/static/fleet-state.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
