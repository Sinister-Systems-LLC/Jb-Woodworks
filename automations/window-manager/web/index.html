<!-- Author: RKOJ-ELENO :: 2026-05-21 -->
<!-- Sinister Sanctum :: Workstation Web UI (Panel-style rewrite).
     Panel-look: rounded frameless shell, mascot sidebar (4 sections),
     chip-tab header (Agents / Phones / Workstation), KPI strip,
     project sub-tab strip, niri-style stacked agent consoles in main body.
     Static HTML/CSS/JS — served by FastAPI (server.py) from /static/.
     pywebview owns the OS chrome; this body has no titlebar of its own. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Sinister Sanctum :: Workstation</title>
    <link rel="icon" href="/static/sinister-logo.png">
    <link rel="stylesheet" href="/static/tokens.css">
    <link rel="stylesheet" href="/static/theme.css">
</head>
<body data-density="cozy" data-active-tab="agents">

    <!-- ============================================================
         Sinister Panel-style shell.
           shell-root   :: rounded outer (no Windows chrome — pywebview frameless)
           sidebar      :: mascot + 4 sections of nav items
           main-col     :: header + KPI strip + project sub-tabs + content
         ============================================================ -->
    <div class="shell-root">

        <!-- ============ SIDEBAR ============ -->
        <aside class="sp-sidebar" id="sp-sidebar">
            <!-- Brand mascot (uses /static/skull.svg if it exists, else ASCII fallback) -->
            <div class="sp-brand">
                <div class="sp-brand-mascot">
                    <img src="/static/skull.svg" alt="Sinister Sanctum" onerror="this.replaceWith(Object.assign(document.createElement('pre'),{className:'sp-mascot-ascii',textContent:'  /\\___/\\\n ( o.o )\n  > ^ <'}))">
                </div>
                <div class="sp-brand-text">
                    <div class="sp-brand-wordmark">SINISTER</div>
                    <div class="sp-brand-sub">SANCTUM</div>
                </div>
            </div>

            <!-- Sidebar nav sections — built by app.js (renderSidebarNav).
                 Panel parity: section labels uppercased + bottom hairline. -->
            <nav class="sp-nav" id="sp-nav" aria-label="Primary navigation">
                <!-- injected -->
            </nav>

            <!-- Footer: operator chip + sign-out (matches Panel ProfileBlock). -->
            <div class="sp-sidebar-footer">
                <div class="sp-avatar-row">
                    <div class="sp-avatar" aria-hidden="true">R</div>
                    <div class="sp-avatar-text">
                        <div class="sp-avatar-name">RKOJ-ELENO</div>
                        <div class="sp-avatar-mail">operator</div>
                    </div>
                    <span class="sp-role-chip">EVE</span>
                </div>
                <button class="sp-signout" id="sp-signout" title="Sign out (Workstation EXE)">
                    <span class="sp-signout-glyph" aria-hidden="true">&#x21B5;</span>
                    Sign Out
                </button>
            </div>
        </aside>

        <!-- ============ MAIN COLUMN ============ -->
        <div class="sp-main">

            <!-- ====== HEADER (title + chip tabs + action icons) ====== -->
            <header class="sp-header">
                <div class="sp-header-left">
                    <h1 class="sp-title" id="sp-title">WORKSTATION</h1>
                    <nav class="sp-chips" role="tablist" aria-label="Primary tabs">
                        <button class="sp-chip active" role="tab" data-tab="agents" aria-selected="true">
                            <span class="sp-chip-glyph" aria-hidden="true">&#9881;</span>
                            <span class="sp-chip-label">Agents</span>
                            <span class="sp-chip-count" data-bind="chip-agents-count">0</span>
                        </button>
                        <button class="sp-chip" role="tab" data-tab="phones" aria-selected="false">
                            <span class="sp-chip-glyph" aria-hidden="true">&#9742;</span>
                            <span class="sp-chip-label">Phones</span>
                            <span class="sp-chip-count" data-bind="chip-phones-count">0</span>
                        </button>
                        <button class="sp-chip" role="tab" data-tab="workstation" aria-selected="false">
                            <span class="sp-chip-glyph" aria-hidden="true">&#9636;</span>
                            <span class="sp-chip-label">Workstation</span>
                        </button>
                    </nav>
                </div>
                <div class="sp-header-right">
                    <button class="sp-icon-btn" id="hdr-alerts" title="Pending operator requests" aria-label="Pending operator requests">
                        <span class="sp-icon-glyph">!</span>
                        <span class="sp-icon-badge danger" id="alerts-count" hidden></span>
                    </button>
                    <button class="sp-icon-btn" id="hdr-bell" title="Cross-agent inbox" aria-label="Inbox">
                        <span class="sp-icon-glyph">&#9788;</span>
                        <span class="sp-icon-badge accent" id="inbox-count" hidden></span>
                    </button>
                    <button class="sp-icon-btn sp-icon-wide" id="hdr-palette" title="Command palette (Ctrl+K)">
                        <span class="sp-icon-glyph">&#8984;</span>
                        <span class="sp-icon-text">Search</span>
                        <span class="sp-kbd">K</span>
                    </button>
                    <button class="sp-icon-btn" id="hdr-settings" title="Settings" aria-label="Settings">
                        <span class="sp-icon-glyph">&#9881;</span>
                    </button>
                    <span class="sp-health-pill" id="health-pill" title="server health">&#9679; online</span>
                    <span class="sp-clock" id="clock">--:--</span>
                </div>
            </header>

            <!-- ====== KPI STRIP (4 stat tiles) ====== -->
            <section class="sp-kpi-strip" aria-label="At-a-glance stats">
                <button class="sp-kpi" id="kpi-phones" data-target-tab="phones" title="Open Phones">
                    <div class="sp-kpi-head">
                        <span class="sp-kpi-label">PHONES ONLINE</span>
                        <span class="sp-kpi-ico" aria-hidden="true">&#9742;</span>
                    </div>
                    <div class="sp-kpi-num" data-bind="kpi-phones-online">&mdash;</div>
                    <div class="sp-kpi-sub" data-bind="kpi-phones-sub">--</div>
                </button>
                <button class="sp-kpi" id="kpi-agents" data-target-tab="agents" title="Open Agents">
                    <div class="sp-kpi-head">
                        <span class="sp-kpi-label">AGENTS ONLINE</span>
                        <span class="sp-kpi-ico" aria-hidden="true">&#9881;</span>
                    </div>
                    <div class="sp-kpi-num" data-bind="kpi-agents-online">&mdash;</div>
                    <div class="sp-kpi-sub" data-bind="kpi-agents-sub">--</div>
                </button>
                <button class="sp-kpi" id="kpi-vault" data-target-tab="workstation" title="Open Workstation (vault)">
                    <div class="sp-kpi-head">
                        <span class="sp-kpi-label">VAULT USED</span>
                        <span class="sp-kpi-ico" aria-hidden="true">&#9776;</span>
                    </div>
                    <div class="sp-kpi-num" data-bind="kpi-vault-used">&mdash;</div>
                    <div class="sp-kpi-sub" data-bind="kpi-vault-sub">--</div>
                </button>
                <button class="sp-kpi" id="kpi-pending" data-target-tab="workstation" title="Operator requests">
                    <div class="sp-kpi-head">
                        <span class="sp-kpi-label">PENDING REQUESTS</span>
                        <span class="sp-kpi-ico" aria-hidden="true">!</span>
                    </div>
                    <div class="sp-kpi-num" data-bind="kpi-pending">&mdash;</div>
                    <div class="sp-kpi-sub" data-bind="kpi-pending-sub">--</div>
                </button>
            </section>

            <!-- ====== PROJECT SUB-TAB STRIP (filters agents) ====== -->
            <nav class="sp-projstrip" id="sp-projstrip" aria-label="Project filter">
                <!-- injected by app.js (renderProjectStrip) — one chip per project.json key.
                     [All N] is first. Click filters the visible agent consoles. -->
            </nav>

            <!-- ====== TAB CONTENT ====== -->
            <main class="sp-content" id="sp-content">

                <!-- ===== AGENTS pane (niri-style stacked consoles) ===== -->
                <section class="sp-pane sp-pane-agents active" id="pane-agents">
                    <div class="sp-pane-toolbar">
                        <button class="sp-btn primary" id="agents-new" data-act="new-agent">
                            <span class="sp-btn-glyph">&#43;</span> Spawn agent
                        </button>
                        <button class="sp-btn ghost" id="agents-broadcast" data-act="broadcast">Broadcast</button>
                        <button class="sp-btn ghost" id="agents-refresh" data-act="refresh-agents">Refresh</button>
                        <div class="sp-spacer"></div>
                        <span class="sp-count" data-bind="agents-grid-count">0 visible</span>
                    </div>
                    <div class="sp-agent-stack" id="agent-stack" data-bind="agent-stack">
                        <div class="sp-empty">loading agents...</div>
                    </div>
                </section>

                <!-- ===== PHONES pane (device card grid) ===== -->
                <section class="sp-pane sp-pane-phones" id="pane-phones" hidden>
                    <div class="sp-pane-toolbar">
                        <button class="sp-btn primary" id="phones-scan" data-act="scan-all">Scan all</button>
                        <button class="sp-btn ghost" id="phones-refresh" data-act="refresh-devices">Refresh</button>
                        <div class="sp-spacer"></div>
                        <span class="sp-count" data-bind="phones-grid-count">0 attached</span>
                    </div>
                    <div class="sp-device-grid" id="device-grid" data-bind="device-grid">
                        <div class="sp-empty">loading devices...</div>
                    </div>
                </section>

                <!-- ===== WORKSTATION pane (vault + requests + activity) ===== -->
                <section class="sp-pane sp-pane-workstation" id="pane-workstation" hidden>
                    <div class="sp-pane-toolbar">
                        <button class="sp-btn primary" data-act="open-vault">Open vault</button>
                        <button class="sp-btn ghost" data-act="open-requests">Operator requests</button>
                        <button class="sp-btn ghost" data-act="open-cycle-points">Cycle points</button>
                        <button class="sp-btn ghost" data-act="open-scheduler">Scheduler</button>
                        <div class="sp-spacer"></div>
                        <span class="sp-count" id="ws-summary-count">--</span>
                    </div>
                    <div class="sp-ws-grid">
                        <div class="sp-ws-card" id="ws-vault">
                            <header class="sp-ws-card-head"><h3>Vault</h3><span class="sp-ws-sub" data-bind="ws-vault-status">--</span></header>
                            <div class="sp-ws-card-body">
                                <div class="sp-meter"><div class="sp-meter-fill" data-bind="ws-vault-fill" style="width:0%"></div></div>
                                <div class="sp-ws-row"><span>Used</span><span data-bind="ws-vault-used">--</span></div>
                                <div class="sp-ws-row"><span>Free</span><span data-bind="ws-vault-free">--</span></div>
                                <button class="sp-btn ghost btn-mini" data-act="vault-commit">Commit file</button>
                            </div>
                        </div>
                        <div class="sp-ws-card" id="ws-requests">
                            <header class="sp-ws-card-head"><h3>Operator requests</h3><span class="sp-ws-sub" data-bind="ws-requests-count">0</span></header>
                            <div class="sp-ws-card-body" data-bind="ws-requests-list">
                                <div class="sp-empty">no pending requests</div>
                            </div>
                        </div>
                        <div class="sp-ws-card" id="ws-activity">
                            <header class="sp-ws-card-head"><h3>Activity feed</h3><span class="sp-ws-sub">live</span></header>
                            <div class="sp-ws-card-body" data-bind="ws-activity-list">
                                <div class="sp-empty">loading...</div>
                            </div>
                        </div>
                        <div class="sp-ws-card" id="ws-cycle">
                            <header class="sp-ws-card-head"><h3>Cycle points</h3><span class="sp-ws-sub" data-bind="ws-cycle-count">0</span></header>
                            <div class="sp-ws-card-body" data-bind="ws-cycle-list">
                                <div class="sp-empty">no cycle points yet</div>
                            </div>
                        </div>
                    </div>
                </section>

            </main>
        </div>
    </div>

    <!-- ===== Toast container (single slot, app.js reuses #toast) ===== -->
    <div id="toast" class="sp-toast" role="status" aria-live="polite"></div>

    <!-- ===== Modal mount point (broadcast, spawn agent, vault commit) ===== -->
    <div id="modal-root"></div>

    <!-- ============================================================
         TEMPLATES — minimal, reused by app.js cloneNode().
         ============================================================ -->

    <!-- Agent console card (one per active session, stacks vertically). -->
    <template id="tpl-agent-console">
        <article class="sp-agent" data-bind="agent-card">
            <header class="sp-agent-head">
                <span class="sp-agent-dot" data-bind="agent-dot"></span>
                <span class="sp-agent-name" data-bind="agent-name">agent</span>
                <span class="sp-agent-project" data-bind="agent-project">project</span>
                <span class="sp-agent-mode" data-bind="agent-mode">mode</span>
                <div class="sp-spacer"></div>
                <span class="sp-agent-last" data-bind="agent-last">--</span>
                <button class="sp-icon-btn" data-act="resume" title="Resume session">&#9654;</button>
                <button class="sp-icon-btn" data-act="popout" title="Pop out">&#8599;</button>
                <button class="sp-icon-btn" data-act="close" title="Close session">&#10005;</button>
            </header>
            <div class="sp-agent-tail" data-bind="agent-tail">
                <div class="sp-empty">(no recent activity)</div>
            </div>
            <footer class="sp-agent-input">
                <input class="sp-input" type="text" data-bind="agent-input" placeholder="/help · /clear · /compact · /resume · /create · /save · /git · /mcp · /effort · /fast · or send a message">
                <button class="sp-btn primary" data-act="send">SEND</button>
            </footer>
        </article>
    </template>

    <!-- Device card (one per adb device). -->
    <template id="tpl-device-card">
        <article class="sp-device" data-bind="device-card">
            <header class="sp-device-head">
                <span class="sp-device-dot" data-bind="device-dot"></span>
                <span class="sp-device-model" data-bind="device-model">model</span>
                <span class="sp-device-state" data-bind="device-state">state</span>
                <span class="sp-device-transport" data-bind="device-transport">transport</span>
            </header>
            <div class="sp-device-body">
                <div class="sp-device-row"><span>Serial</span><code data-bind="device-serial">--</code></div>
                <div class="sp-device-row"><span>Lane</span><span data-bind="device-lane">--</span></div>
            </div>
            <footer class="sp-device-actions">
                <button class="sp-btn ghost btn-mini" data-act="view">View (scrcpy)</button>
                <button class="sp-btn ghost btn-mini" data-act="push">Push file</button>
                <button class="sp-btn ghost btn-mini" data-act="logs">Logs</button>
            </footer>
        </article>
    </template>

    <!-- Modal shell. -->
    <template id="tpl-modal">
        <div class="sp-modal-overlay" data-act="dismiss">
            <div class="sp-modal" role="dialog" aria-modal="true">
                <header class="sp-modal-head"><h3 data-bind="modal-title">Modal</h3><button class="sp-icon-btn" data-act="close">&#10005;</button></header>
                <div class="sp-modal-body" data-bind="modal-body"></div>
                <footer class="sp-modal-foot" data-bind="modal-foot"></footer>
            </div>
        </div>
    </template>

    <!-- Spawn-agent modal body. -->
    <template id="tpl-spawn-form">
        <form class="sp-form" data-bind="spawn-form">
            <label class="sp-form-row">
                <span class="sp-form-label">Project</span>
                <select class="sp-input" data-bind="sf-project"></select>
            </label>
            <label class="sp-form-row">
                <span class="sp-form-label">Mode</span>
                <select class="sp-input" data-bind="sf-mode">
                    <option value="overview">overview</option>
                    <option value="dev">dev</option>
                    <option value="audit">audit</option>
                    <option value="deploy">deploy</option>
                    <option value="push">push</option>
                    <option value="debug">debug</option>
                    <option value="explore">explore</option>
                </select>
            </label>
            <label class="sp-form-row sp-form-check">
                <input type="checkbox" data-bind="sf-fast">
                <span>Fast mode (Opus 4.6 instead of 4.7)</span>
            </label>
            <label class="sp-form-row">
                <span class="sp-form-label">Custom prompt (optional)</span>
                <textarea class="sp-input" rows="3" data-bind="sf-prompt" placeholder="e.g. focus on X after spawn"></textarea>
            </label>
        </form>
    </template>

    <!-- Broadcast modal body. -->
    <template id="tpl-broadcast-form">
        <form class="sp-form" data-bind="broadcast-form">
            <label class="sp-form-row">
                <span class="sp-form-label">Subkind</span>
                <select class="sp-input" data-bind="bc-subkind">
                    <option value="UPDATE">UPDATE</option>
                    <option value="ASK">ASK</option>
                    <option value="DELEGATE">DELEGATE</option>
                </select>
            </label>
            <label class="sp-form-row">
                <span class="sp-form-label">Message</span>
                <textarea class="sp-input" rows="4" data-bind="bc-body" placeholder="message to broadcast..."></textarea>
            </label>
        </form>
    </template>

    <script src="/static/popout.js"></script>
    <script src="/static/palette.js"></script>
    <script src="/static/cycle-points.js"></script>
    <script src="/static/scheduler.js"></script>
    <!-- fleet-state.js MUST load before app.js — app.js subscribes to FleetState on init. -->
    <script src="/static/fleet-state.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
