<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" aria-label="Sinister Sanctum skull">
  <defs>
    <linearGradient id="skullGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A06EFF"/>
      <stop offset="100%" stop-color="#7A3DD4"/>
    </linearGradient>
    <filter id="skullGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g fill="none" stroke="url(#skullGrad)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" filter="url(#skullGlow)">
    <!-- horns -->
    <path d="M22 10 L18 22 L26 22 Z"/>
    <path d="M78 10 L82 22 L74 22 Z"/>
    <!-- cranium -->
    <path d="M50 16 C 28 16, 18 30, 18 48 C 18 58, 22 66, 28 70 L 28 80 L 40 80 L 40 86 L 60 86 L 60 80 L 72 80 L 72 70 C 78 66, 82 58, 82 48 C 82 30, 72 16, 50 16 Z"/>
    <!-- eyes -->
    <circle cx="38" cy="48" r="6" fill="url(#skullGrad)" stroke="none"/>
    <circle cx="62" cy="48" r="6" fill="url(#skullGrad)" stroke="none"/>
    <!-- nose -->
    <path d="M50 56 L 46 66 L 50 68 L 54 66 Z" fill="url(#skullGrad)" stroke="none"/>
    <!-- teeth -->
    <path d="M36 72 L 64 72"/>
    <path d="M42 72 L 42 78"/>
    <path d="M50 72 L 50 78"/>
    <path d="M58 72 L 58 78"/>
  </g>
</svg>
