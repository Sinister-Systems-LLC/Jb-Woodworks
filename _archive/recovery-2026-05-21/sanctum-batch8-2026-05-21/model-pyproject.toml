[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "sinister-model"
version = "0.1.0"
description = "Sinister Sanctum :: model list/current/switch (jcode model list parity). Reads agent-host-routing.md to enumerate task-class routing."
authors = [{ name = "RKOJ-ELENO" }]
license = { text = "AGPL-3.0-or-later" }
requires-python = ">=3.9"
readme = "README.md"

[project.scripts]
sinister-model = "sinister_model.__main__:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["sinister_model*"]
