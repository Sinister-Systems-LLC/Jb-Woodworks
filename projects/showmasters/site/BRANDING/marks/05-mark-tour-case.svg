<!-- M05 — Tour-case. Stamped on a road-case end, with corner reinforcements + butterfly latch. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-label="SMPL tour case">
  <defs>
    <linearGradient id="tcG" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%"  stop-color="#E8C078"/>
      <stop offset="100%" stop-color="#9C7126"/>
    </linearGradient>
    <pattern id="diamond" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <path d="M7 0 L14 7 L7 14 L0 7 Z" fill="none" stroke="#202028" stroke-width="0.6"/>
    </pattern>
  </defs>

  <!-- Case body -->
  <rect x="8" y="8" width="464" height="344" rx="10" fill="#13131A"/>
  <rect x="8" y="8" width="464" height="344" rx="10" fill="url(#diamond)" opacity="0.7"/>

  <!-- Corner reinforcements (4) -->
  <path d="M8 8 L60 8 L60 22 L22 22 L22 60 L8 60 Z"     fill="url(#tcG)"/>
  <path d="M472 8 L420 8 L420 22 L458 22 L458 60 L472 60 Z" fill="url(#tcG)"/>
  <path d="M8 352 L60 352 L60 338 L22 338 L22 300 L8 300 Z" fill="url(#tcG)"/>
  <path d="M472 352 L420 352 L420 338 L458 338 L458 300 L472 300 Z" fill="url(#tcG)"/>

  <!-- Butterfly latch (left) -->
  <g fill="url(#tcG)" stroke="#0B0B0F" stroke-width="1">
    <rect x="40" y="160" width="36" height="40" rx="3"/>
    <circle cx="58" cy="180" r="4" fill="#0B0B0F"/>
  </g>
  <!-- Butterfly latch (right) -->
  <g fill="url(#tcG)" stroke="#0B0B0F" stroke-width="1">
    <rect x="404" y="160" width="36" height="40" rx="3"/>
    <circle cx="422" cy="180" r="4" fill="#0B0B0F"/>
  </g>

  <!-- Central stencil plate -->
  <rect x="120" y="100" width="240" height="160" fill="#0B0B0F" stroke="url(#tcG)" stroke-width="2"/>

  <g font-family="Inter, Arial, sans-serif" font-weight="900" fill="url(#tcG)" text-anchor="middle">
    <text x="240" y="200" font-size="86" letter-spacing="-3">SMPL</text>
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#D7D7DD" text-anchor="middle" letter-spacing="5">
    <text x="240" y="234" font-size="12" font-weight="700">SHOW MASTERS</text>
  </g>
</svg>
