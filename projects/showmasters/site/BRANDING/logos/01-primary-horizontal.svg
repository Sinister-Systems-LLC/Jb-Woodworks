<!-- 01 — Primary horizontal lockup. The default. Use on dark surfaces. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 132" role="img" aria-label="SMPL — Show Masters Production Logistics">
  <defs>
    <linearGradient id="g01" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%"  stop-color="#E8C078"/>
      <stop offset="55%" stop-color="#D4A24A"/>
      <stop offset="100%" stop-color="#B88736"/>
    </linearGradient>
  </defs>

  <g font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-weight="900" fill="#FFFFFF">
    <text x="0"   y="68" font-size="72" letter-spacing="-2.4">S</text>
    <text x="52"  y="68" font-size="72" letter-spacing="-2.4">M</text>
    <text x="120" y="68" font-size="72" letter-spacing="-2.4">P</text>
    <text x="178" y="68" font-size="72" letter-spacing="-2.4">L</text>
  </g>

  <!-- Gold corner triangle (the canonical spotlight nick) -->
  <path d="M226 16 L242 16 L242 32 Z" fill="url(#g01)"/>
  <!-- Gold accent rule under the wordmark -->
  <rect x="0" y="86" width="226" height="2" fill="url(#g01)" opacity="0.7"/>

  <g font-family="Inter, 'Helvetica Neue', Arial, sans-serif" fill="#FFFFFF" letter-spacing="3.2">
    <text x="0" y="106" font-size="16" font-weight="700">SHOW MASTERS</text>
    <text x="0" y="124" font-size="11" font-weight="500" fill="#D7D7DD" letter-spacing="5.4">PRODUCTION LOGISTICS</text>
  </g>
</svg>
