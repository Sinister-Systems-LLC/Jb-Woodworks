<!-- Author: RKOJ-ELENO :: 2026-05-23 -->
<!-- 02 — Spotlight Cone. The "hero" concept variant. A gobo light cone projects
     down across the wordmark from upper-right. Industry-true visual metaphor. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" role="img" aria-label="SMPL Spotlight">
  <defs>
    <linearGradient id="cone" x1="1" x2="0" y1="0" y2="1">
      <stop offset="0%"   stop-color="#FFE8B8" stop-opacity="0.85"/>
      <stop offset="40%"  stop-color="#D4A24A" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#D4A24A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="goldHardEdge" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%"  stop-color="#E8C078"/>
      <stop offset="55%" stop-color="#D4A24A"/>
      <stop offset="100%" stop-color="#9C7126"/>
    </linearGradient>
    <radialGradient id="bloom" cx="78%" cy="2%" r="60%">
      <stop offset="0%"  stop-color="#FFE8B8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFE8B8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Spotlight bloom from the lamp position (upper-right) -->
  <circle cx="376" cy="6" r="120" fill="url(#bloom)"/>

  <!-- The cone — trapezoidal beam projecting down/left from the lamp -->
  <path d="M340 0 L480 0 L432 200 L292 200 Z" fill="url(#cone)"/>

  <!-- Thin gold hard edge on the cone leading side -->
  <line x1="340" y1="0" x2="292" y2="200" stroke="url(#goldHardEdge)" stroke-width="1.2" opacity="0.85"/>

  <!-- Wordmark — sits inside the lit cone -->
  <g font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-weight="900" fill="#FFFFFF">
    <text x="16"  y="104" font-size="82" letter-spacing="-2.6">S</text>
    <text x="76"  y="104" font-size="82" letter-spacing="-2.6">M</text>
    <text x="154" y="104" font-size="82" letter-spacing="-2.6">P</text>
    <text x="220" y="104" font-size="82" letter-spacing="-2.6">L</text>
  </g>

  <!-- Triangle micro-mark anchors the cone tip -->
  <path d="M268 16 L288 16 L288 36 Z" fill="url(#goldHardEdge)"/>

  <!-- Tagline -->
  <g font-family="Inter, 'Helvetica Neue', Arial, sans-serif" fill="#FFFFFF" letter-spacing="3.4">
    <text x="16" y="142" font-size="17" font-weight="700">SHOW MASTERS</text>
    <text x="16" y="162" font-size="12" font-weight="500" fill="#D7D7DD" letter-spacing="5.6">PRODUCTION LOGISTICS</text>
  </g>

  <!-- Gold rule -->
  <rect x="16" y="176" width="200" height="2" fill="url(#goldHardEdge)" opacity="0.6"/>
</svg>
