<!-- 05 — Cinematic banner. 16:5 aspect. Email header, web header, slide masters. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" role="img" aria-label="SMPL banner">
  <defs>
    <linearGradient id="bgB" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%"   stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#1C1C24"/>
    </linearGradient>
    <linearGradient id="goldB" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"  stop-color="#E8C078"/>
      <stop offset="100%" stop-color="#9C7126"/>
    </linearGradient>
    <radialGradient id="bloomB" cx="92%" cy="0%" r="70%">
      <stop offset="0%"   stop-color="#FFE8B8" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#FFE8B8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="500" fill="url(#bgB)"/>
  <circle cx="1480" cy="20" r="320" fill="url(#bloomB)"/>
  <!-- Vertical hard gold rule near center -->
  <rect x="820" y="80" width="2" height="340" fill="url(#goldB)" opacity="0.55"/>

  <!-- Wordmark left side -->
  <g font-family="Inter, Arial, sans-serif" font-weight="900" fill="#FFFFFF">
    <text x="80" y="280" font-size="220" letter-spacing="-6">SMPL</text>
  </g>
  <path d="M740 60 L800 60 L800 120 Z" fill="url(#goldB)"/>
  <g font-family="Inter, Arial, sans-serif" fill="#FFFFFF" letter-spacing="8">
    <text x="80" y="340" font-size="32" font-weight="700">SHOW MASTERS PRODUCTION LOGISTICS</text>
  </g>

  <!-- Right-side stat block -->
  <g font-family="Inter, Arial, sans-serif" fill="#FFFFFF">
    <text x="880" y="160" font-size="22" font-weight="600" letter-spacing="6" fill="#D4A24A">SINCE 2002</text>
    <text x="880" y="230" font-size="58" font-weight="800">We Make Great Days Happen.</text>
    <text x="880" y="285" font-size="26" font-weight="500" fill="#C7C7CF">Stagehands · Riggers · Technicians · Crew Leads</text>
    <text x="880" y="375" font-size="20" font-weight="700" letter-spacing="4" fill="#D7D7DD">ORLANDO, FL · DALLAS, TX · 33 STATES</text>
  </g>

  <!-- Bottom hairline -->
  <rect x="80" y="440" width="1440" height="2" fill="url(#goldB)" opacity="0.7"/>
</svg>
