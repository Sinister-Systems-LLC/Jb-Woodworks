<!-- A02 — Gold shimmer on the triangle. Subtle animation, looks expensive on dark surfaces. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" role="img" aria-label="SMPL gold shimmer animated">
  <defs>
    <linearGradient id="shg" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#9C7126"/>
      <stop offset="50%"  stop-color="#FFE8B8"/>
      <stop offset="100%" stop-color="#9C7126"/>
      <animate attributeName="x1" values="-1;1" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;2" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <g font-family="Inter, Arial, sans-serif" font-weight="900" fill="#FFFFFF">
    <text x="0"   y="60" font-size="62" letter-spacing="-2">S</text>
    <text x="46"  y="60" font-size="62" letter-spacing="-2">M</text>
    <text x="106" y="60" font-size="62" letter-spacing="-2">P</text>
    <text x="156" y="60" font-size="62" letter-spacing="-2">L</text>
  </g>
  <path d="M198 16 L210 16 L210 28 Z" fill="url(#shg)"/>
  <g font-family="Inter, Arial, sans-serif" fill="#FFFFFF" letter-spacing="3.2">
    <text x="1" y="90"  font-size="15" font-weight="700">SHOW MASTERS</text>
    <text x="1" y="108" font-size="11" font-weight="500" fill="#D7D7DD" letter-spacing="4.8">PRODUCTION LOGISTICS</text>
  </g>
</svg>
