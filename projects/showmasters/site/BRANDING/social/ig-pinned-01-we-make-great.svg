<!-- Author: RKOJ-ELENO :: 2026-05-23 -->
<!-- IG pinned banner 1 of 3. Reads left-to-right with banners 02 + 03.
     Together they form: "We Make Great Days / Happen / Every Day."
     1080x1080. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="SMPL — We Make Great Days">
  <defs>
    <linearGradient id="bg1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%"  stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#1A1A22"/>
    </linearGradient>
    <linearGradient id="gld1" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"  stop-color="#E8C078"/>
      <stop offset="100%" stop-color="#9C7126"/>
    </linearGradient>
    <radialGradient id="bloom1" cx="92%" cy="0%" r="70%">
      <stop offset="0%"   stop-color="#FFE8B8" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#FFE8B8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg1)"/>
  <!-- Spotlight bloom (top-right) -->
  <circle cx="1020" cy="40" r="540" fill="url(#bloom1)"/>
  <!-- Gold corner triangle (canonical) -->
  <path d="M820 0 L1080 0 L1080 260 Z" fill="url(#gld1)"/>

  <!-- Mini SMPL mark, upper-left -->
  <g font-family="Inter, Arial, sans-serif" font-weight="900" fill="#FFFFFF">
    <text x="80" y="138" font-size="58" letter-spacing="-2">SMPL</text>
  </g>
  <path d="M232 78 L256 78 L256 102 Z" fill="url(#gld1)"/>
  <text x="80" y="170" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" letter-spacing="4" fill="#D7D7DD">SHOW MASTERS · PRODUCTION LOGISTICS</text>

  <!-- Gold hairline rule (continues across the 3-card set) -->
  <rect x="80" y="220" width="920" height="2" fill="url(#gld1)" opacity="0.55"/>

  <!-- Headline (DM Serif Display feel via Inter heavy + italic em) -->
  <g font-family="Inter, Arial, sans-serif" fill="#FFFFFF">
    <text x="80" y="500" font-size="120" font-weight="900" letter-spacing="-4">We Make</text>
    <text x="80" y="640" font-size="120" font-weight="900" letter-spacing="-4">Great Days</text>
  </g>

  <!-- Subhead -->
  <text x="80" y="730" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500" fill="#C7C7CF">Live event crewing. Since 2002.</text>

  <!-- Bottom locality + arrow hint to next card -->
  <rect x="80" y="940" width="920" height="2" fill="url(#gld1)" opacity="0.55"/>
  <g font-family="Inter, Arial, sans-serif" fill="#D7D7DD" letter-spacing="6">
    <text x="80" y="1000" font-size="22" font-weight="700">ORLANDO · FORT WORTH</text>
  </g>
  <!-- Card index 1/3 + chevron right -->
  <text x="940" y="1000" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#D4A24A" letter-spacing="4" text-anchor="end">1 / 3 →</text>
</svg>
