<!-- Social S02 — LinkedIn cover. 1584×396. Safe-area centered. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" role="img" aria-label="SMPL LinkedIn banner">
  <defs>
    <linearGradient id="lnBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%"  stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#1C1C24"/>
    </linearGradient>
    <linearGradient id="lnG" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"  stop-color="#E8C078"/>
      <stop offset="100%" stop-color="#9C7126"/>
    </linearGradient>
    <radialGradient id="lnBloom" cx="100%" cy="0%" r="80%">
      <stop offset="0%"   stop-color="#FFE8B8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFE8B8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1584" height="396" fill="url(#lnBg)"/>
  <circle cx="1500" cy="40" r="320" fill="url(#lnBloom)"/>
  <!-- LinkedIn safe zone is roughly centered; place key copy in middle 880px -->
  <g font-family="Inter, Arial, sans-serif" font-weight="900" fill="#FFFFFF">
    <text x="352" y="208" font-size="120" letter-spacing="-3">SMPL</text>
  </g>
  <path d="M584 56 L632 56 L632 104 Z" fill="url(#lnG)"/>
  <g font-family="Inter, Arial, sans-serif" fill="#FFFFFF" letter-spacing="6">
    <text x="352" y="252" font-size="22" font-weight="700">SHOW MASTERS PRODUCTION LOGISTICS</text>
    <text x="352" y="292" font-size="34" font-weight="800" fill="#FFFFFF">We Make Great Days Happen.</text>
    <text x="352" y="330" font-size="18" font-weight="500" fill="#C7C7CF" letter-spacing="3">Stagehands · Riggers · Technicians · Crew Leads · Since 2002</text>
  </g>
  <!-- Bottom rule + locality -->
  <rect x="352" y="350" width="880" height="2" fill="url(#lnG)" opacity="0.6"/>
  <text x="352" y="376" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600"
        letter-spacing="6" fill="#9D9DA8">ORLANDO, FL · DALLAS, TX · 33 STATES</text>
</svg>
