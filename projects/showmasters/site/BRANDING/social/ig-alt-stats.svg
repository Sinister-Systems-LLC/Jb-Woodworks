<!-- IG alternative pinned banner — STATS SHEET. Standalone, single-card. 1080x1080. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="SMPL stats">
  <defs>
    <linearGradient id="bgS" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%"  stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#1A1A22"/>
    </linearGradient>
    <linearGradient id="gldS" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"  stop-color="#E8C078"/>
      <stop offset="100%" stop-color="#9C7126"/>
    </linearGradient>
    <radialGradient id="bloomS" cx="90%" cy="5%" r="65%">
      <stop offset="0%"   stop-color="#FFE8B8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFE8B8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bgS)"/>
  <circle cx="980" cy="60" r="460" fill="url(#bloomS)"/>
  <path d="M860 0 L1080 0 L1080 220 Z" fill="url(#gldS)"/>

  <!-- SMPL mark -->
  <g font-family="Inter, Arial, sans-serif" font-weight="900" fill="#FFFFFF">
    <text x="80" y="138" font-size="58" letter-spacing="-2">SMPL</text>
  </g>
  <path d="M232 78 L256 78 L256 102 Z" fill="url(#gldS)"/>
  <text x="80" y="170" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" letter-spacing="4" fill="#D7D7DD">SHOW MASTERS · PRODUCTION LOGISTICS</text>

  <!-- Title -->
  <g font-family="Inter, Arial, sans-serif" font-weight="900" fill="#FFFFFF">
    <text x="80" y="300" font-size="72" letter-spacing="-3">By the numbers.</text>
  </g>
  <rect x="80" y="320" width="160" height="3" fill="url(#gldS)"/>

  <!-- Stat grid (2x2) -->
  <g font-family="Inter, Arial, sans-serif">
    <!-- Row 1 -->
    <g>
      <text x="80"  y="500" font-size="160" font-weight="900" letter-spacing="-6" fill="#D4A24A">22+</text>
      <text x="80"  y="555" font-size="22" font-weight="600" letter-spacing="4" fill="#D7D7DD">YEARS IN BUSINESS</text>
      <text x="80"  y="585" font-size="16" font-weight="500" fill="#8E8E98">Founded 2002. Still answering the phone.</text>
    </g>
    <g>
      <text x="560" y="500" font-size="160" font-weight="900" letter-spacing="-6" fill="#D4A24A">1,700+</text>
      <text x="560" y="555" font-size="22" font-weight="600" letter-spacing="4" fill="#D7D7DD">CLIENTS SERVED</text>
      <text x="560" y="585" font-size="16" font-weight="500" fill="#8E8E98">From corporate to concert to convention.</text>
    </g>
    <!-- Row 2 -->
    <g>
      <text x="80"  y="800" font-size="160" font-weight="900" letter-spacing="-6" fill="#D4A24A">33</text>
      <text x="80"  y="855" font-size="22" font-weight="600" letter-spacing="4" fill="#D7D7DD">STATES CREWED</text>
      <text x="80"  y="885" font-size="16" font-weight="500" fill="#8E8E98">Two hubs. Traveling teams. Nationwide.</text>
    </g>
    <g>
      <text x="560" y="800" font-size="160" font-weight="900" letter-spacing="-6" fill="#D4A24A">130+</text>
      <text x="560" y="855" font-size="22" font-weight="600" letter-spacing="4" fill="#D7D7DD">CREW ON PAYROLL</text>
      <text x="560" y="885" font-size="16" font-weight="500" fill="#8E8E98">W-4 employees. Not 1099 contractors.</text>
    </g>
  </g>

  <!-- Bottom CTA -->
  <rect x="80" y="940" width="920" height="2" fill="url(#gldS)" opacity="0.55"/>
  <text x="80" y="1000" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2" fill="#FFFFFF">showmasters.com  ·  (877) 765-2267</text>
</svg>
