<!-- Author: RKOJ-ELENO :: 2026-05-23 -->
<!-- IG pinned banner 2 of 3. The hero word: "Happen" — centered, oversized,
     with a stylized truss + light cone behind it. 1080x1080. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="SMPL — Happen">
  <defs>
    <linearGradient id="bg2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%"  stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#1A1A22"/>
    </linearGradient>
    <linearGradient id="gld2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%"  stop-color="#E8C078"/>
      <stop offset="55%" stop-color="#D4A24A"/>
      <stop offset="100%" stop-color="#9C7126"/>
    </linearGradient>
    <radialGradient id="cone2" cx="50%" cy="0%" r="90%">
      <stop offset="0%"   stop-color="#FFE8B8" stop-opacity="0.5"/>
      <stop offset="50%"  stop-color="#D4A24A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#D4A24A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg2)"/>

  <!-- Stage-light cone descending from top center -->
  <path d="M460 0 L620 0 L820 1080 L260 1080 Z" fill="url(#cone2)"/>

  <!-- Stylized truss element (faint, decorative) -->
  <g stroke="#3C3C44" stroke-width="2" fill="none" opacity="0.5">
    <line x1="60" y1="180" x2="1020" y2="180"/>
    <line x1="60" y1="198" x2="1020" y2="198"/>
    <!-- X bracing -->
    <g>
      <line x1="100" y1="180" x2="140" y2="198"/><line x1="140" y1="180" x2="100" y2="198"/>
      <line x1="180" y1="180" x2="220" y2="198"/><line x1="220" y1="180" x2="180" y2="198"/>
      <line x1="260" y1="180" x2="300" y2="198"/><line x1="300" y1="180" x2="260" y2="198"/>
      <line x1="340" y1="180" x2="380" y2="198"/><line x1="380" y1="180" x2="340" y2="198"/>
      <line x1="420" y1="180" x2="460" y2="198"/><line x1="460" y1="180" x2="420" y2="198"/>
      <line x1="500" y1="180" x2="540" y2="198"/><line x1="540" y1="180" x2="500" y2="198"/>
      <line x1="580" y1="180" x2="620" y2="198"/><line x1="620" y1="180" x2="580" y2="198"/>
      <line x1="660" y1="180" x2="700" y2="198"/><line x1="700" y1="180" x2="660" y2="198"/>
      <line x1="740" y1="180" x2="780" y2="198"/><line x1="780" y1="180" x2="740" y2="198"/>
      <line x1="820" y1="180" x2="860" y2="198"/><line x1="860" y1="180" x2="820" y2="198"/>
      <line x1="900" y1="180" x2="940" y2="198"/><line x1="940" y1="180" x2="900" y2="198"/>
    </g>
  </g>
  <!-- Gold rule (continues from card 1) -->
  <rect x="80" y="220" width="920" height="2" fill="url(#gld2)" opacity="0.55"/>

  <!-- The hero word -->
  <g font-family="Inter, Arial, sans-serif" font-weight="900" fill="#FFFFFF" text-anchor="middle">
    <text x="540" y="640" font-size="260" letter-spacing="-10">Happen</text>
  </g>

  <!-- Italicized accent underline (gold) -->
  <rect x="200" y="660" width="680" height="3" fill="url(#gld2)" opacity="0.8"/>

  <!-- Subhead -->
  <text x="540" y="730" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500" fill="#C7C7CF">Stagehands · Riggers · Technicians · Crew Leads</text>

  <!-- Bottom rule -->
  <rect x="80" y="940" width="920" height="2" fill="url(#gld2)" opacity="0.55"/>

  <!-- Small stat row -->
  <g font-family="Inter, Arial, sans-serif" fill="#D7D7DD" text-anchor="middle">
    <text x="270" y="1000" font-size="22" font-weight="800" fill="#D4A24A">1,700+</text>
    <text x="540" y="1000" font-size="22" font-weight="800" fill="#D4A24A">33 STATES</text>
    <text x="810" y="1000" font-size="22" font-weight="800" fill="#D4A24A">130+ CREW</text>
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#8E8E98" text-anchor="middle" font-size="13" font-weight="500" letter-spacing="3">
    <text x="270" y="1025">CLIENTS</text>
    <text x="540" y="1025">CREWED</text>
    <text x="810" y="1025">ON PAYROLL</text>
  </g>
  <!-- Card index 2/3 -->
  <text x="940" y="80" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#D4A24A" letter-spacing="4" text-anchor="end">2 / 3</text>
</svg>
