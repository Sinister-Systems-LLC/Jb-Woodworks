<!-- Social S04 — YouTube channel art. 2560×1440. Safe-area inside the middle ~1546×423. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2560 1440" role="img" aria-label="SMPL YouTube channel art">
  <defs>
    <linearGradient id="ytBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%"  stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#1C1C24"/>
    </linearGradient>
    <linearGradient id="ytG" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"  stop-color="#E8C078"/>
      <stop offset="100%" stop-color="#9C7126"/>
    </linearGradient>
    <radialGradient id="ytBl" cx="100%" cy="0%" r="65%">
      <stop offset="0%"   stop-color="#FFE8B8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFE8B8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="2560" height="1440" fill="url(#ytBg)"/>
  <circle cx="2400" cy="80" r="640" fill="url(#ytBl)"/>

  <!-- Safe zone is roughly x: 507-2053, y: 508-932 -->
  <g font-family="Inter, Arial, sans-serif" font-weight="900" fill="#FFFFFF">
    <text x="780" y="780" font-size="280" letter-spacing="-8">SMPL</text>
  </g>
  <path d="M1320 560 L1400 560 L1400 640 Z" fill="url(#ytG)"/>
  <g font-family="Inter, Arial, sans-serif" fill="#FFFFFF" letter-spacing="9">
    <text x="780" y="850" font-size="36" font-weight="700">SHOW MASTERS PRODUCTION LOGISTICS</text>
    <text x="780" y="910" font-size="22" font-weight="500" fill="#C7C7CF" letter-spacing="5">Stagehands · Riggers · Technicians · Crew Leads · Since 2002</text>
  </g>
  <rect x="780" y="932" width="1000" height="2" fill="url(#ytG)" opacity="0.55"/>
</svg>
