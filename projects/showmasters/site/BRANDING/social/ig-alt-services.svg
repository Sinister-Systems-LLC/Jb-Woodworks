    <g transform="translate(395 560)">
      <rect x="0" y="0" width="290" height="160" rx="14" fill="#13131A" stroke="rgba(212,162,74,0.25)" stroke-width="1"/>
      <g transform="translate(20 22)" stroke="#D4A24A" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 22a14 14 0 0 1 28 0"/>
