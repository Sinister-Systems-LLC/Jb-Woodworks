        <line x1="12" y1="8" x2="12" y2="32"/>
        <line x1="20" y1="8" x2="20" y2="32"/>
        <line x1="28" y1="8" x2="28" y2="32"/>
        <rect x="9" y="14" width="6" height="4" rx="1" fill="#D4A24A"/>
        <rect x="17" y="22" width="6" height="4" rx="1" fill="#D4A24A"/>
