      <g transform="translate(20 22)" stroke="#D4A24A" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="10" cy="6" r="3"/>
        <path d="M10 9v8l-3 9"/>
        <path d="M10 18l5 4"/>
        <rect x="16" y="20" width="16" height="12" rx="1.5"/>
      </g>
      <text x="20" y="106" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#FFFFFF">Stagehands</text>
      <text x="20" y="132" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#8E8E98">Audio · Lighting · Video · Scenic</text>
