<!-- IG alternative pinned banner — SERVICES OVERVIEW. Standalone single-card. 1080x1080. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="SMPL services">
  <defs>
    <linearGradient id="bgV" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%"  stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#1A1A22"/>
    </linearGradient>
    <linearGradient id="gldV" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"  stop-color="#E8C078"/>
      <stop offset="100%" stop-color="#9C7126"/>
    </linearGradient>
    <radialGradient id="bloomV" cx="90%" cy="5%" r="65%">
      <stop offset="0%"   stop-color="#FFE8B8" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#FFE8B8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bgV)"/>
  <circle cx="980" cy="60" r="460" fill="url(#bloomV)"/>
  <path d="M860 0 L1080 0 L1080 220 Z" fill="url(#gldV)"/>

  <!-- SMPL mark -->
  <g font-family="Inter, Arial, sans-serif" font-weight="900" fill="#FFFFFF">
    <text x="80" y="138" font-size="58" letter-spacing="-2">SMPL</text>
  </g>
  <path d="M232 78 L256 78 L256 102 Z" fill="url(#gldV)"/>
  <text x="80" y="170" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" letter-spacing="4" fill="#D7D7DD">SHOW MASTERS · PRODUCTION LOGISTICS</text>

  <!-- Title -->
  <g font-family="Inter, Arial, sans-serif" font-weight="900" fill="#FFFFFF">
    <text x="80" y="290" font-size="72" letter-spacing="-3">What we do.</text>
  </g>
  <rect x="80" y="310" width="180" height="3" fill="url(#gldV)"/>

  <!-- 6 service tiles in 2x3 grid -->
  <g>
