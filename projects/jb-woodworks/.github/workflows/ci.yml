# Author: RKOJ-ELENO :: 2026-05-28
# Lint + typecheck + build on every push/PR. No deploy step — Railway listens to main.

name: ci

on:
  push:
    branches: ["main", "agent/jb-woodworks/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
      NEXT_TELEMETRY_DISABLED: "1"

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma migrate (push)
        run: npx prisma db push --skip-generate

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint --max-warnings 0
        continue-on-error: true

      - name: Next build
        run: npm run build
