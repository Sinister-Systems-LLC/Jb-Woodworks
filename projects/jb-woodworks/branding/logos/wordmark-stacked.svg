<!-- JB Woodworks - stacked lockup with display serif tagline. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280" role="img" aria-label="JB Woodworks - Premium Craftsmanship">
  <rect width="360" height="280" rx="20" fill="#080808"/>
  <line x1="80" y1="60" x2="280" y2="60" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
  <text x="180" y="130" text-anchor="middle"
        fill="#ffffff"
        font-family="Inter, sans-serif"
        font-size="62"
        font-weight="900"
        letter-spacing="10">JB</text>
  <text x="180" y="156" text-anchor="middle"
        fill="#c9a84c"
