        font-size="11"
        font-weight="700"
        letter-spacing="12">WOODWORKS</text>
  <line x1="80" y1="180" x2="280" y2="180" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
  <text x="180" y="218" text-anchor="middle"
        fill="#ffffff"
        font-family="'DM Serif Display', Georgia, serif"
        font-size="20"
        font-style="italic">Premium Craftsmanship.</text>
  <text x="180" y="244" text-anchor="middle"
        fill="#c9a84c"
        font-family="'DM Serif Display', Georgia, serif"
        font-size="20"
        font-style="italic">Built to Last.</text>
</svg>
