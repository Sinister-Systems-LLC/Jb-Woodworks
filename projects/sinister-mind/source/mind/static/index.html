<!DOCTYPE html>
<!-- Sinister Mind :: index.html
     Author: RKOJ-ELENO :: 2026-05-21
     License: AGPL-3.0-or-later -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sinister Mind</title>
<style>
  :root {
    --bg: #0A0A0F;
    --bg-2: #15131A;
    --purple: #7A3DD4;
    --purple-bright: #A06EFF;
    --light-purple: #E8D6FF;
    --cyan: #6EE8FF;
    --green: #6EFFA0;
    --yellow: #FFD66E;
    --red: #FF6E6E;
    --magenta: #FF6EE8;
    --white: #EEEEEE;
    --dim: #666;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--white);
    font-family: "Cascadia Code", "Cascadia Mono", Consolas, Menlo, monospace;
    font-size: 13px;
    height: 100vh;
    overflow: hidden;
    display: flex;
  }
  /* Sidebar */
  aside {
    width: 320px;
    background: var(--bg-2);
    border-right: 1px solid var(--purple);
    overflow-y: auto;
    padding: 12px;
  }
  aside h1 {
    margin: 0 0 4px 0;
    font-size: 15px;
    color: var(--purple-bright);
    letter-spacing: 2px;
  }
  aside h2 {
    margin: 16px 0 4px 0;
    font-size: 11px;
    color: var(--cyan);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  aside .sub {
    color: var(--dim);
    font-size: 10px;
    margin-bottom: 12px;
  }
  aside input, aside select {
    width: 100%;
    background: var(--bg);
    color: var(--white);
    border: 1px solid var(--purple);
    padding: 6px 8px;
    font-family: inherit;
    font-size: 12px;
    margin-bottom: 8px;
  }
  aside input:focus, aside select:focus {
    outline: none;
    border-color: var(--purple-bright);
  }
  .legend-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    margin: 3px 0;
    color: var(--light-purple);
  }
  .legend-swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .stats {
    color: var(--dim);
    font-size: 11px;
    line-height: 1.6;
  }
  .stats b { color: var(--purple-bright); }
  .project-pill {
    display: block;
    background: var(--bg);
    color: var(--cyan);
    padding: 4px 8px;
    margin: 3px 0;
    border-left: 2px solid var(--cyan);
    font-size: 11px;
    cursor: pointer;
  }
  .project-pill:hover { background: #1a1721; }
  .project-pill.active { background: #1a1721; border-left-color: var(--purple-bright); color: var(--purple-bright); }
  .search-hit {
    display: block;
    padding: 3px 6px;
    margin: 2px 0;
    background: var(--bg);
    color: var(--light-purple);
    font-size: 10px;
    cursor: pointer;
    border-left: 2px solid transparent;
  }
  .search-hit:hover { border-left-color: var(--purple-bright); }
  /* Graph */
  main {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  svg { width: 100%; height: 100%; display: block; background: radial-gradient(circle at center, #15131A, #0A0A0F 70%); }
  .node circle {
    cursor: pointer;
    stroke: rgba(255,255,255,0.1);
    stroke-width: 1.5;
  }
  .node circle:hover { stroke: var(--white); stroke-width: 2.5; }
  .node text {
    fill: var(--light-purple);
    font-size: 9px;
    pointer-events: none;
    text-anchor: middle;
  }
  .link {
    stroke: rgba(122, 61, 212, 0.25);
    stroke-width: 1;
  }
  .link.highlighted { stroke: var(--purple-bright); stroke-width: 2.5; }
  .node.dimmed circle { opacity: 0.15; }
  .node.dimmed text { opacity: 0.05; }
  .link.dimmed { opacity: 0.05; }
  /* Tooltip */
  #tooltip {
    position: absolute;
    background: var(--bg-2);
    color: var(--white);
    border: 1px solid var(--purple);
    padding: 6px 10px;
    font-size: 11px;
    pointer-events: none;
    display: none;
    max-width: 280px;
    z-index: 100;
  }
  #tooltip .ttl { color: var(--purple-bright); font-weight: bold; }
  #tooltip .tag { color: var(--cyan); font-size: 10px; }
  /* Top bar */
  .topbar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 28px;
    background: rgba(21, 19, 26, 0.85);
    border-bottom: 1px solid var(--purple);
    padding: 4px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--light-purple);
    z-index: 50;
  }
  .topbar b { color: var(--purple-bright); letter-spacing: 1px; }
</style>
</head>
<body>
<aside>
  <h1>SINISTER MIND</h1>
  <div class="sub">visual brain of the Sanctum fleet</div>

  <h2>Search</h2>
  <input id="search-input" type="text" placeholder="slug / tag / title / agent..." />
  <div id="search-results"></div>

  <h2>Filter by Project</h2>
  <select id="project-filter">
    <option value="">— all projects —</option>
  </select>

  <h2>Shortest Path</h2>
  <input id="path-a" type="text" placeholder="node A id (e.g. project:sanctum)" />
  <input id="path-b" type="text" placeholder="node B id (e.g. brain:auto-mode-launcher-pattern)" />
  <button id="path-go" style="width:100%;background:var(--purple);color:var(--white);border:none;padding:6px;cursor:pointer;font-family:inherit;">Find Path</button>
  <div id="path-result" style="margin-top:6px;color:var(--cyan);font-size:10px;"></div>

  <h2>Legend</h2>
  <div class="legend-row"><span class="legend-swatch" style="background:#6EE8FF"></span> Project</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#A06EFF"></span> Brain entry</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#6EFFA0"></span> Plan artifact</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#FFD66E"></span> PROGRESS</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#FF6EE8"></span> Cross-agent msg</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#FF6E6E"></span> Resume-point</div>

  <h2>Stats</h2>
  <div class="stats" id="stats">loading...</div>

  <h2>Projects</h2>
  <div id="project-pills"></div>
</aside>
<main>
  <div class="topbar">
    <div><b>SINISTER MIND</b>  ::  <span id="title-status">loading the brain...</span></div>
    <div id="title-counts" style="color:var(--dim);"></div>
  </div>
  <svg id="graph"></svg>
  <div id="tooltip"></div>
</main>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="/static/mind.js"></script>
</body>
</html>
