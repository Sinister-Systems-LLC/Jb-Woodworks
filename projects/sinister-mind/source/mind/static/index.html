<!DOCTYPE html>
<!-- Sinister Mind :: index.html
     Author: RKOJ-ELENO :: 2026-05-21

     Liquid glass + iOS 18 purple aesthetic. Backdrop-blur sidebar.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sinister Mind</title>
<link rel="stylesheet" href="/static/mind.css">
</head>
<body>
  <!-- Background layers for liquid-glass effect -->
  <div class="bg-gradient"></div>
  <div class="bg-noise"></div>

  <aside class="glass-panel">
    <header>
      <h1>SINISTER MIND</h1>
      <div class="subtitle">visual brain of the Sanctum fleet</div>
    </header>

    <section>
      <label>Views</label>
      <a href="/" class="glass-btn" style="display:block;text-align:center;text-decoration:none;color:#A06EFF;margin-bottom:6px">◈ Graph</a>
      <a href="/diagrams" class="glass-btn" style="display:block;text-align:center;text-decoration:none;color:#A06EFF">◇ Memory-graph diagrams</a>
    </section>

    <section>
      <label>Search</label>
      <input id="search-input" type="text" placeholder="slug / tag / title / agent..." autocomplete="off">
      <div id="search-results"></div>
    </section>

    <section>
      <label>Project Filter</label>
      <select id="project-filter">
        <option value="">— all projects —</option>
      </select>
    </section>

    <section>
      <label>Tag Chips</label>
      <div id="tag-cloud" class="tag-cloud"></div>
    </section>

    <section>
      <label>Shortest Path</label>
      <input id="path-a" type="text" placeholder="node A id">
      <input id="path-b" type="text" placeholder="node B id">
      <button id="path-go" class="glass-btn">Find Path</button>
      <div id="path-result"></div>
    </section>

    <section>
      <label>Legend</label>
      <div class="legend-row"><span class="legend-swatch" style="background:#6EE8FF"></span> Project</div>
      <div class="legend-row"><span class="legend-swatch" style="background:#A06EFF"></span> Brain entry</div>
      <div class="legend-row"><span class="legend-swatch" style="background:#6EFFA0"></span> Plan artifact</div>
      <div class="legend-row"><span class="legend-swatch" style="background:#FFD66E"></span> PROGRESS</div>
      <div class="legend-row"><span class="legend-swatch" style="background:#FF6EE8"></span> Cross-agent msg</div>
      <div class="legend-row"><span class="legend-swatch" style="background:#FF6E6E"></span> Resume-point</div>
    </section>

    <section>
      <label>Stats</label>
      <div class="stats" id="stats">loading...</div>
    </section>

    <section>
      <label>Projects</label>
      <div id="project-pills"></div>
    </section>

    <footer>
      <div class="live-indicator">
        <span class="dot"></span>
        <span id="live-status">live</span>
      </div>
    </footer>
  </aside>

  <main>
    <div class="topbar glass-panel-thin">
      <div class="topbar-left">
        <span class="brand">◈ SINISTER MIND</span>
        <span class="topbar-sep">::</span>
        <span id="title-status">loading the brain...</span>
      </div>
      <div class="topbar-right" id="title-counts"></div>
    </div>
    <svg id="graph"></svg>
    <div id="tooltip" class="glass-panel-thin"></div>
  </main>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="/static/mind.js"></script>
</body>
</html>
