services:
  panel-shell:
    image: ghcr.io/sinister/panel-shell:latest
    container_name: panel-shell
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      SINISTER_MODE: desktop
      NEXT_PUBLIC_API: http://vault-api:5078
    depends_on:
      vault-api:
        condition: service_healthy
      yjs-server:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/healthz -o /dev/null -w '%{http_code}' | grep -E '200|307'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      sinister.tier: core
      sinister.mesh.expose: "true"
      sinister.mesh.port: "3000"
      sinister.accent: purple
      sinister.reboot: never
