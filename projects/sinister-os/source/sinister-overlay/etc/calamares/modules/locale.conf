# Sinister OS — Calamares locale module.
# Author: RKOJ-ELENO :: 2026-05-24
#
# Default locale + timezone. US English + UTC matches the operator's primary
# region. The locale module also writes /etc/locale.conf and runs locale-gen
# for the configured locale.
#
# geoip: disabled. We do not want the installer making outbound HTTP calls
# during an install (it slows down + adds a failure mode). The operator can
# change region post-install via `timedatectl set-timezone <region/zone>`.
#
# Schema:
#   https://github.com/calamares/calamares/blob/calamares/src/modules/locale/locale.conf

---
# Default region + zone. timedatectl will pick this up and write
# /etc/localtime as a symlink to /usr/share/zoneinfo/Etc/UTC.
region: "Etc"
zone:   "UTC"

# Default locale.gen path (standard Arch / CachyOS layout).
localeGenPath: "/etc/locale.gen"

# Use the live ISO's system timezone if it was operator-changed in the live
# environment. (We default to UTC; if the operator clicked their timezone in
# the live session, respect that.)
useSystemTimezone: false

# Do NOT adjust the live ISO's clock — that's the live session's problem,
# not the installer's.
adjustLiveTimezone: false

# Skip geoip lookup. Offline-safe, no telemetry concern.
# (To re-enable later, uncomment and configure:)
# geoip:
#   style:    "json"
#   url:      "https://geoip.kde.org/v1/calamares"
#   selector: "timezone"
