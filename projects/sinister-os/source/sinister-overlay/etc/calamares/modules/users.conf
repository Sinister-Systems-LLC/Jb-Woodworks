# Sinister OS — Calamares users module.
# Author: RKOJ-ELENO :: 2026-05-24
#
# FULL-AUTO PRESET — pre-create the 'eve' user, set the default password to
# 'sinister' (operator MUST rotate post-install — surfaced on the finished page),
# enable autologin, add to wheel + autologin groups so /etc/sudoers.d/eve picks up.
#
# Schema:
#   https://github.com/calamares/calamares/blob/calamares/src/modules/users/users.conf

---
# Groups every new user gets. wheel = sudo group; autologin = greetd autologin group.
defaultGroups:
  - name: users
    must_exist: true
    system: true
  - lp
  - video
  - network
  - storage
  - audio
  - input
  - name: wheel
    must_exist: true
    system: true
  - name: autologin
    must_exist: false
    system: true

# Group required for greetd autologin. The user is added automatically.
autologinGroup: autologin

# Group that grants sudo via /etc/sudoers (separate from our /etc/sudoers.d/eve
# NOPASSWD allowlist, which is more permissive for the eve user specifically).
sudoersGroup: wheel

# Root password: SET to the same value as the default user password. Operator
# can `sudo passwd root` post-install to lock or rotate.
setRootPassword: true

# Autologin: yes. The whole point of Sinister OS is single-operator boot.
doAutologin: true

# Pre-seed the eve user. presets: lets us pre-fill the users page so the operator
# does not get a name/password prompt — they see a pre-filled, greyed-out page
# they can Next through.
presets:
  fullName:
    value:    "EVE Operator"
    editable: false
  loginName:
    value:    "eve"
    editable: false

# Allow weak passwords (the default is strong-only). We ship a known-weak default
# precisely because the operator is expected to rotate it on first login.
# minLength: -1 + minclass=0 means "anything goes".
passwordRequirements:
  minLength: -1
  maxLength: -1
  libpwquality:
    - minlen=0
    - minclass=0

# Reserved names that cannot be used for the login user.
user:
  shell:            /bin/bash
  forbidden_names:  [ root, bin, daemon, mail, ftp, http, nobody, dbus, eve-system ]
  home_permissions: "0750"
