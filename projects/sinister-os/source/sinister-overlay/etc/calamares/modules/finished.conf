# Sinister OS — Calamares finished module.
# Author: RKOJ-ELENO :: 2026-05-24
#
# Final-screen behavior. We auto-reboot 10 seconds after install completes so
# the operator can walk away and come back to a booted Sinister OS desktop.
# The countdown gives them a chance to cancel if they need to swap the install
# media first.
#
# Schema:
#   https://github.com/calamares/calamares/blob/calamares/src/modules/finished/finished.conf

---
# restartNowMode: "always" -> show the restart UI in checked+confirmed state.
# Combined with quit-at-end + restartNowCommand, this triggers the reboot
# automatically when the finished page closes.
restartNowMode: "always"

# Reboot command. `systemctl -i reboot` ignores any inhibitors (no daemon can
# block the operator-confirmed reboot).
restartNowCommand: "systemctl -i reboot"

# DBus desktop notification on success. Useful when the installer window is
# minimized.
notifyOnFinished: true

# Custom completion text the operator reads on the finished page. Markdown is
# rendered. CRITICAL: surface the default-password rotation step here — operator
# directive 2026-05-24 said full-auto, but security needs the operator's hand.
restartNowText: |
  ## Welcome to Sinister OS

  Installation complete. The system will reboot in 10 seconds.

  **Default credentials:**
  - User: `eve`
  - Password: `sinister`

  **Rotate the password on first login:**
  ```
  passwd
  sudo passwd root
  ```

  After reboot:
  - greetd auto-logs `eve` into Hyprland.
  - The Sinister Panel kiosk auto-starts (port :8088 in the Docker stack).
  - EVE is reachable via the `eve` CLI or the UNIX socket at `/run/sinister/eve.sock`.

  For overrides on this install preset, see
  `/etc/calamares/CALAMARES-AUTOMATION.md` on the live ISO or the
  `sinister-overlay/CALAMARES-AUTOMATION.md` doc in the source tree.
