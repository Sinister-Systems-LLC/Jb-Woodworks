# Sinister OS — Calamares bootloader module.
# Author: RKOJ-ELENO :: 2026-05-24
#
# Boots via systemd-boot (a.k.a. bootctl / sd-boot) on EFI hardware. systemd-boot
# is simpler than GRUB, ships in the systemd package, and is the upstream
# Calamares default for EFI. The entry title is set to "Sinister OS" so the
# bootloader picker shows the Sinister name (NOT "Arch Linux" or "CachyOS").
#
# Schema:
#   https://github.com/calamares/calamares/blob/calamares/src/modules/bootloader/bootloader.conf

---
# EFI bootloader choice. systemd-boot is what we ship; GRUB stays available
# only if the operator builds a BIOS variant later.
efiBootLoader: "systemd-boot"

# Bootloader entry identifier (shown in `bootctl list` and EFI vars).
efiBootloaderId: "sinister"

# Install an EFI fallback (bootx64.efi) so the system still boots if NVRAM
# variables get wiped. Cheap insurance.
installEFIFallback: true

# Default kernel parameters appended to every loader entry.
#   quiet              — suppress boot spam (Plymouth picks up the screen)
#   splash             — enable Plymouth
#   rd.udev.log_level=3 — quiet udev during early boot
#   nowatchdog         — disable hardware watchdog (cleaner shutdown in VMs)
kernelParams:
  - "quiet"
  - "splash"
  - "rd.udev.log_level=3"
  - "nowatchdog"

# GRUB fallback executable path (only used if efiBootLoader is switched to grub).
grubInstall: "grub-install"

# Default kernel selection. Calamares walks /boot for vmlinuz-* and creates one
# loader entry per kernel found. We name them "Sinister OS" + variant suffix so
# the picker reads naturally.
kernel:    "/boot/vmlinuz-linux"
img:       "/boot/initramfs-linux.img"
fallback:  "/boot/initramfs-linux-fallback.img"

# 5-second timeout in the loader picker. Long enough for the operator to pick
# fallback if needed; short enough to feel snappy.
timeout: "5"
