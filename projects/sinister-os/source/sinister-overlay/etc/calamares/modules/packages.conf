# Sinister OS — Calamares packages module.
# Author: RKOJ-ELENO :: 2026-05-24
#
# Bridges the live-ISO package set into the installed system, plus a Sinister-OS
# specific allowlist (Hyprland tooling, EVE service deps, AUR helper). Runs AFTER
# unpackfs lays down the rootfs.
#
# Schema:
#   https://github.com/calamares/calamares/blob/calamares/src/modules/packages/packages.conf

---
# Backend: pacman (CachyOS base).
backend: pacman

# Skip if no internet — but log a WARN. Most VM installs will have network;
# air-gapped installs will get just the squashfs contents.
skip_if_no_internet: true

# Refresh the package DB before the install operation (sync pacman -Sy).
update_db: true

# Do NOT do a full system update during install — it would balloon install time
# and we want the install to be reproducible against the ISO snapshot. Operator
# can `pacman -Syu` first thing post-install.
update_system: false

# Operations list. Each entry is one action; install: aborts on failure,
# try_install: continues. Our policy: hard-require Hyprland + greetd + the EVE
# control-plane deps; soft-require the AUR helper (paru) since some users will
# bring their own.
operations:
  - install:
      # Display + compositor stack (Wayland)
      - hyprland
      - waybar
      - swww
      - rofi-wayland
      - xdg-desktop-portal-hyprland
      - polkit-kde-agent

      # Display manager (greetd is what displaymanager.conf points at)
      - greetd
      - greetd-tuigreet

      # Audio / network basics
      - pipewire
      - pipewire-pulse
      - pipewire-jack
      - wireplumber
      - networkmanager

      # Bootloader (systemd-boot is in systemd package; ucode for CPU updates)
      - systemd
      - intel-ucode
      - amd-ucode

      # Filesystem tooling (btrfs root)
      - btrfs-progs
      - dosfstools

      # Plymouth (sinister.plymouth theme ships in our overlay)
      - plymouth

      # EVE control-plane runtime deps (Python service + socket utils)
      - python
      - python-pip
      - python-yaml
      - socat

      # Sinister CLI conveniences operator expects
      - git
      - curl
      - wget
      - vim
      - htop
      - btop

  - try_install:
      # AUR helper. Operator can swap to yay if they prefer.
      - paru

  - remove:
      # Strip CachyOS-specific branding remnants the live ISO carries that we do
      # not want on the installed system. Our overlay has already rewritten
      # os-release; this drops the per-package marketing.
      - cachyos-hello
