# Sinister OS — Calamares hostname module.
# Author: RKOJ-ELENO :: 2026-05-24
#
# Sets the installed system's hostname to "sinister-laptop" by default. The
# operator can change it post-install with `hostnamectl set-hostname <name>`.
# This matches the seed hostname in our overlay's etc/hostname.sinister so the
# live ISO + the installed system show the same name in the prompt.
#
# Schema reference: Calamares hostname module reads /etc/calamares/modules/hostname.conf
# (the upstream README is sparse; field set is taken from the Calamares source
# at src/modules/hostname/HostnameJob.cpp + the example config in CachyOS).

---
# Write /etc/hostname on the target.
setHostname: true

# Write /etc/hosts on the target (maps 127.0.1.1 to the hostname).
setEtcHosts: true

# Static fallback hostname (used when location: literal). Matches
# /etc/hostname.sinister.
location: literal
hostnameTemplate: "sinister-laptop"
