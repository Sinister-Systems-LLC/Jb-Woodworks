# Sinister OS — Calamares displaymanager module.
# Author: RKOJ-ELENO :: 2026-05-24
#
# Configures greetd (lightweight, Wayland-native display manager) to autologin
# the 'eve' user into Hyprland. greetd is the policy match for a single-operator
# kiosk: minimal surface, no theming yak-shaving, plays well with Wayland.
#
# Schema:
#   https://github.com/calamares/calamares/blob/calamares/src/modules/displaymanager/displaymanager.conf

---
# Only greetd is configured. If greetd is not installed (e.g. operator removed
# it before install), Calamares walks the fallback list. We restrict to greetd
# so we get a predictable boot UX.
displaymanagers:
  - greetd

# Force Hyprland as the default session. Path is the Hyprland-shipped
# .desktop file installed by the hyprland package.
defaultDesktopEnvironment:
  executable:  "/usr/bin/Hyprland"
  desktopFile: "hyprland"

# Run the basic user/group/dir setup (creates /etc/greetd, sets up greeter user
# permissions). Required for greetd to function on a fresh install.
basicSetup: true

# Not openSUSE; skip /etc/sysconfig/displaymanager handling.
sysconfigSetup: false

# greetd-specific configuration.
greetd:
  greeter_user:        "greeter"
  greeter_group:       "greeter"
  # Path to a GTK CSS file that themes the greeter. Sinister purple accent —
  # ships from our overlay at /etc/greetd/sinister-greeter.css (added in P3).
  greeter_css_location: "/etc/greetd/sinister-greeter.css"
