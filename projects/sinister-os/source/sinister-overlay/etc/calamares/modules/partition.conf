# Sinister OS — Calamares partition module.
# Author: RKOJ-ELENO :: 2026-05-24
#
# FULL-AUTO PRESET — single-disk wipe-and-install on the first detected disk.
#
# What this does:
#   - Pick the first detected disk (operator does not get a chooser)
#   - Wipe it
#   - Create three partitions in order:
#       1) 1 GiB FAT32 EFI System Partition at /boot/efi
#       2) 100 GiB btrfs root at /
#       3) Remainder btrfs /home
#   - No swap (use zram via the systemd-zram-generator package instead — lower disk wear)
#   - No LUKS (operator can encrypt post-install once they understand the tradeoffs)
#   - No manual partitioning (allowManualPartitioning: false hides the option entirely)
#
# DESTRUCTIVE: this preset assumes single-disk VM target. Multi-disk-preserve is
# explicitly a future feature — operator must override via kernel param
# `sinister.skip-auto=1` before booting if they want to keep data on a non-/dev/sda disk.
#
# Schema:
#   https://github.com/calamares/calamares/blob/calamares/src/modules/partition/partition.conf

---
# EFI System Partition: 1 GiB FAT32 mounted at /boot/efi.
efi:
  mountPoint:      "/boot/efi"
  recommendedSize: 1024MiB
  minimumSize:     300MiB
  label:           "SINISTER_EFI"

# Default filesystem for all non-EFI partitions: btrfs (CachyOS standard;
# matches their kernel tunings + supports the snapper integration we ship later).
defaultFileSystemType: "btrfs"

# Swap policy: none. We use zram at runtime instead (configured via
# /etc/systemd/zram-generator.conf in P4). userSwapChoices is intentionally
# single-valued so the operator gets no chooser.
userSwapChoices:
  - none

# Initial choice when the partition page loads. "erase" pre-selects the
# "Erase disk" radio, with no manual option visible (allowManualPartitioning: false).
initialPartitioningChoice: erase
initialSwapChoice:         none

# Hide the manual partitioning UI entirely. Operator gets one path: full erase.
allowManualPartitioning: false

# Disable LUKS in the auto-partition layout. (Encryption is a P5 follow-up;
# operator must opt in explicitly.)
enableLuksAutomatedPartitioning: false

# UI knobs.
drawNestedPartitions:      false
alwaysShowPartitionLabels: true

# Custom partition layout. Calamares walks this list in order on the chosen disk.
# Sizes:
#   - efi: handled separately by the efi: block above (added first, 1 GiB)
#   - rootfs: 100 GiB btrfs at /
#   - home:   100% remainder btrfs at /home
partitionLayout:
  - name:       "sinister-root"
    filesystem: "btrfs"
    mountPoint: "/"
    size:       100GiB
    minSize:    40GiB
  - name:       "sinister-home"
    filesystem: "btrfs"
    mountPoint: "/home"
    size:       100%

# Minimum disk size we will accept (in GiB). Anything smaller, Calamares aborts
# before touching the disk. 60 GiB lets a slim VM (40 GiB root + 20 GiB /home)
# still install while preventing accidental installs on tiny USB sticks.
requiredStorage: 60
