# Sinister OS — Calamares keyboard module.
# Author: RKOJ-ELENO :: 2026-05-24
#
# Default to US English. Calamares' keyboard view reads the current X11 keymap
# from the live session and pre-selects it, so the operator's keyboard "just
# works" through the install. If they were on a non-US keymap in the live ISO,
# that gets carried through (writeEtcDefaultKeyboard + xOrgConfFileName ensure
# the same keymap lands on the installed system).
#
# Schema:
#   https://github.com/calamares/calamares/blob/calamares/src/modules/keyboard/keyboard.conf

---
# X11 keyboard config file written into the target. Standard Arch path.
xOrgConfFileName: "/etc/X11/xorg.conf.d/00-keyboard.conf"

# Source directory for converted keymaps (used to map X11 layouts -> console keymaps).
# Arch / CachyOS layout.
convertedKeymapPath: "/usr/share/kbd/keymaps/xkb"

# Write /etc/default/keyboard (Debian-style fallback). Harmless on Arch and
# helps any package that reads it.
writeEtcDefaultKeyboard: true

# Use localectl/localed (systemd) instead of writing config files directly.
# Cleaner integration with the rest of the systemd-managed config.
useLocale1: true

# Let the keyboard module guess the layout from the live session if the
# operator did not pick one explicitly.
guessLayout: true

# Pre-select US English / qwerty as the default if guessLayout fails.
# These three fields are honored by the keyboardq (Qt) view; the legacy view
# defaults to xkb us/-/-/- if absent.
model:   "pc105"
layout:  "us"
variant: ""
