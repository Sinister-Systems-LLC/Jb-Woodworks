# Sinister OS — Calamares top-level settings.
# Author: RKOJ-ELENO :: 2026-05-24
#
# This is the master orchestration file Calamares reads on startup. It pins:
#   - the modules-search path (where each module's binary + default conf live)
#   - the sequence (show -> exec -> show) the installer walks the operator through
#   - the branding component (loads etc/calamares/branding/sinister/branding.desc)
#   - hard-off cancel buttons so the operator cannot accidentally abort mid-install
#
# Schema reference:
#   https://github.com/calamares/calamares/blob/calamares/settings.conf
#
# IMPORTANT: this preset is full-auto. Every module that supports prompt suppression
# has it suppressed (welcome -> instant Next, partition -> erase first disk, users ->
# pre-seed eve/sinister, finished -> auto-reboot 10s). The operator clicks
# "Install Sinister OS" once and walks away.

---
modules-search: [ local, /usr/lib/calamares/modules ]

# instances let us run the same module multiple times with different configs.
# We use it only for the contextualprocess module so we can split pre-install
# hooks from post-install hooks if needed in P4.
instances: []

# Sequence is the heart. Each phase is a list of module groups, executed top-to-bottom.
sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary
  - exec:
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - users
      - displaymanager
      - networkcfg
      - hwclock
      - services-systemd
      - bootloader
      - packages
      - umount
  - show:
      - finished

# Branding component dir name (looks for /etc/calamares/branding/sinister/branding.desc).
branding: sinister

# Do NOT show a "Yes, install now" confirmation — the operator already clicked Install.
prompt-install: false

# Chroot the exec phase into the target so package installs land on the new disk.
dont-chroot: false

# Hide Cancel entirely. Operator hard-canonical 2026-05-24: full-auto, no questions,
# no chance of clicking the wrong button two phases in.
disable-cancel: true
disable-cancel-during-exec: true

# Hide back/next during exec so the operator doesn't try to navigate mid-job.
hide-back-and-next-during-exec: true

# Auto-close the installer window after the finished module fires its reboot.
quit-at-end: true

# Label the tool as "installer" (not OEM setup).
oem-setup: false
