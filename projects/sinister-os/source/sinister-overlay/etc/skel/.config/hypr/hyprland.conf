# Sinister OS — Hyprland config. Author: RKOJ-ELENO :: 2026-05-24
# Derived from sinister-theme-tokens.css: --accent #c084fc, --accent-strong #8b5cf6, --bg #0e0a1f
#
# Lives at: /etc/skel/.config/hypr/hyprland.conf (template for new users)
#       and /root/.config/hypr/hyprland.conf      (root login)

# ===== monitor (auto, prefer high-res) =====
monitor = , preferred, auto, 1

# ===== autostart =====
exec-once = swww-daemon
exec-once = swww img /usr/share/backgrounds/sinister/wallpaper-primary.png --transition-type any
exec-once = waybar
exec-once = nm-applet --indicator
exec-once = systemctl --user start sinister-voice.service 2>/dev/null

# ===== general look (Sinister purple) =====
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = rgb(c084fc) rgb(8b5cf6) 45deg
    col.inactive_border = rgba(1a1330ff)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
    }
    drop_shadow = true
    shadow_range = 24
    shadow_render_power = 3
    col.shadow = rgba(c084fc4d)
}

animations {
    enabled = true
    bezier = sinister, 0.22, 1, 0.36, 1
    animation = windows,     1, 4, sinister
    animation = border,      1, 8, sinister
    animation = fade,        1, 5, sinister
    animation = workspaces,  1, 5, sinister
}

dwindle {
    pseudotile = true
    preserve_split = true
}

input {
    kb_layout = us
    follow_mouse = 1
    touchpad { natural_scroll = true }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = rgb(0e0a1f)
}

# ===== keybindings =====
$mainMod = SUPER

bind = $mainMod, RETURN,    exec, kitty
bind = $mainMod, E,         exec, thunar
bind = $mainMod, B,         exec, firefox
bind = $mainMod, Q,         killactive
bind = $mainMod SHIFT, E,   exit
bind = $mainMod, SPACE,     exec, rofi -show drun -theme sinister
bind = $mainMod, V,         togglefloating
bind = $mainMod, F,         fullscreen
bind = $mainMod, P,         pseudo
bind = $mainMod, J,         togglesplit

# focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# workspaces 1-9, plus B (browser) and T (terminal) shortcuts
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod CTRL, B, workspace, name:browser
bind = $mainMod CTRL, T, workspace, name:terminal

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ===== window rules =====
windowrulev2 = workspace name:browser, class:^(firefox|chromium|brave-browser)$
windowrulev2 = workspace name:terminal, class:^(kitty|alacritty|foot)$
