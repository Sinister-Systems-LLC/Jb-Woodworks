# hyprland.conf — Sinister OS Wayland compositor config
# Author: RKOJ-ELENO :: 2026-05-24
#
# Minimal config that launches the Sinister Panel kiosk on session start.
# Operator can drop out of kiosk with Super+Q to get a terminal.

monitor=,preferred,auto,1

env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland

# Sinister purple accent — matches Panel theme tokens
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(8b5cf6ff) rgba(c084fcff) 45deg
    col.inactive_border = rgba(1f1b2eaa)
    layout = dwindle
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 6
        passes = 2
    }
}

animations {
    enabled = yes
    bezier = sinister, 0.25, 0.1, 0.25, 1.0
    animation = windows, 1, 5, sinister
    animation = fade, 1, 5, sinister
    animation = workspaces, 1, 6, sinister
}

# --- autostart: launch the Sinister Panel kiosk ---
exec-once = /usr/local/bin/sinister-panel-kiosk.sh

# --- hotkeys (escape hatches; full set added in P3 via eve daemon) ---
$mod = SUPER
bind = $mod, Q, exec, kitty || foot || xterm
bind = $mod SHIFT, Q, killactive
bind = $mod CTRL, R, exec, hyprctl reload
bind = $mod, RETURN, exec, /usr/local/bin/sinister-panel-kiosk.sh
