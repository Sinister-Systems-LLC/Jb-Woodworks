# pacman.conf — Sinister OS archiso pacman config
# Author: RKOJ-ELENO :: 2026-05-24
#
# Standard Arch mirrors + multilib (needed for steam / lib32 packages).
# Future: add a [sinister] repo entry pointing at our self-hosted package
# server once we've built signed packages for eve-shell, sinister-panel,
# sinister-bus, etc.

[options]
HoldPkg     = pacman glibc
Architecture = auto
CheckSpace
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional
ParallelDownloads = 5

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist
