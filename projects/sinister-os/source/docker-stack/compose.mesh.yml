# compose.mesh.yml — Sinister Mesh M5 overlay (Tailscale per-node sidecar)
# Author: RKOJ-ELENO :: 2026-05-24
#
# Status: SCAFFOLDED (compose validates; no real fleet rollout yet).
#
# Intent (operator verbatim 2026-05-24):
#   "take note these servers need to link over internet as well and be completely
#    safe with like a VPN setup or something like that for complete anonymity ...
#    i need to be able to be in thailand and download my exe file or have the os
#    on the PC and i can connect to my servers i setup in new york and servers
#    i setup in florida with no speed issues or anything like that"
#
# What this overlay adds:
#   - A `tailscale` sidecar service that joins the host to the operator's tailnet.
#     Uses the official tailscale/tailscale image (Alpine-based, tiny).
#     State persists in the named volume `tailscale-state` so re-up keeps node identity.
#
# What this overlay does NOT do:
#   - Auto-create auth keys. The operator generates a TS_AUTHKEY at
#     https://login.tailscale.com/admin/settings/keys (reusable + ephemeral as desired)
#     and exports TS_AUTHKEY in the shell that runs `docker compose ... up`.
#   - Apply ACLs. The ACL JSON template (config/tailscale/acl.json) is pasted into
#     the Tailscale admin console by the operator. Tailscale's API can apply it
#     programmatically but that needs an API token and is M5+ work.
#   - Configure exit-node advertising automatically. Set TS_EXTRA_ARGS per node.
#
# How to apply (per-node):
#   export TS_AUTHKEY=tskey-auth-...           # generated in Tailscale admin
#   export TS_HOSTNAME=sinister-mesh-ny        # picks the node name in the tailnet
#   export TS_EXTRA_ARGS=""                    # ny/fl: --advertise-exit-node
#   docker compose -f docker-compose.yml -f compose.hardened.yml -f compose.mesh.yml up -d
#
# Honest caveat re: Windows-Docker:
#   `network_mode: host` is a no-op on Docker Desktop for Windows (no host networking).
#   On Windows dev hosts, install the official Tailscale Windows client instead of
#   running this sidecar. This overlay is meant for the Linux home servers (NY, FL)
#   and for the eventual Sinister OS install (where tailscaled ships as a systemd unit).

services:

  tailscale:
    image: tailscale/tailscale:stable
    container_name: sinister-tailscale
    hostname: ${TS_HOSTNAME:-sinister-mesh-node}
    restart: unless-stopped

    # Linux host networking is required for exit-node + subnet-router features.
    # On non-Linux hosts the container still joins the tailnet via DERP relay,
    # but cannot serve as exit node. See MESH-DEPLOY.md for the Windows path.
    network_mode: host

    cap_add:
      - NET_ADMIN
      - SYS_MODULE

    devices:
      - /dev/net/tun:/dev/net/tun

    environment:
      TS_AUTHKEY: "${TS_AUTHKEY:-}"
      TS_HOSTNAME: "${TS_HOSTNAME:-sinister-mesh-node}"
      TS_EXTRA_ARGS: "${TS_EXTRA_ARGS:---accept-routes --accept-dns=false}"
      TS_STATE_DIR: "/var/lib/tailscale"
      TS_USERSPACE: "false"

    volumes:
      - tailscale-state:/var/lib/tailscale

    healthcheck:
      test: ["CMD", "tailscale", "status", "--peers=false", "--json"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  tailscale-state:
    name: sinister-tailscale-state
