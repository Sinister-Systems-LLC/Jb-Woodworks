<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="JOKR — joker card mark">
  <title>JOKR — joker card mark</title>
  <desc>Stylized playing card outline with a jester crescent silhouette + JOKR wordmark. Iris border, white type, dark canvas.</desc>
  <rect width="1024" height="1024" fill="#0A0A0F"/>
  <g transform="translate(512 512)">
    <!-- card -->
    <rect x="-220" y="-340" width="440" height="680" rx="40" fill="none" stroke="#A855F7" stroke-width="12"/>
    <!-- corner J marks -->
    <text x="-180" y="-260" font-family="Impact, 'Arial Black', sans-serif" font-size="78" font-weight="900" fill="#A855F7">J</text>
    <text x="180" y="320" font-family="Impact, 'Arial Black', sans-serif" font-size="78" font-weight="900" text-anchor="end" fill="#A855F7" transform="rotate(180 180 296)">J</text>
    <!-- jester crescent silhouette (3 pointed cap) -->
    <g fill="#FFFFFF">
      <path d="M -80 -120 Q -60 -180 0 -180 Q 60 -180 80 -120 L 60 -60 L 30 -100 L 0 -50 L -30 -100 L -60 -60 Z"/>
      <circle cx="-80" cy="-120" r="14"/>
      <circle cx="80" cy="-120" r="14"/>
      <circle cx="0" cy="-180" r="14"/>
    </g>
    <!-- wordmark -->
    <text x="0" y="60" font-family="Impact, 'Arial Black', sans-serif" font-size="140" font-weight="900" letter-spacing="8" text-anchor="middle" fill="#FFFFFF">JOKR</text>
    <text x="0" y="130" font-family="ui-monospace, 'SF Mono', monospace" font-size="22" letter-spacing="14" text-anchor="middle" fill="#A855F7">G L O B A L</text>
  </g>
</svg>
