<?xml version="1.0" encoding="UTF-8"?>
<!-- Author: RKOJ-ELENO :: 2026-05-23 -->
<!-- JB Woodworks UI + service icon sprite. Hand-drawn, no font deps. -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- Service: Docks — distinct silhouette: cleated dock + tied skiff under it -->
  <symbol id="i-dock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Dock deck + 3 pilings -->
    <path d="M2 11h18"/>
    <path d="M5 11v6"/>
    <path d="M11 11v6"/>
    <path d="M17 11v6"/>
    <!-- Cleat on top of dock -->
    <path d="M14 11v-2h2v2"/>
    <!-- Tied boat hull below + mooring rope from cleat -->
    <path d="M3 18l4 3h11l3 -3"/>
    <path d="M15 10c0 -1.2 -1 -2 -2 -2"/>
    <!-- Water ripples -->
    <path d="M2 22c2 -1 4 1 6 0s4 -1 6 0s4 -1 6 0"/>
  </symbol>

  <!-- Service: Custom decks — boards with stairs stepping down + house-attach edge -->
  <symbol id="i-deck" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top deck surface + 3 plank seams -->
    <path d="M3 9h18"/>
    <path d="M3 11h18"/>
    <path d="M3 13h18"/>
    <!-- Side rail + top cap on left -->
    <path d="M3 9v-5"/>
    <path d="M3 4h6"/>
    <path d="M5 9v-5"/>
    <!-- Stairs stepping down on the right -->
    <path d="M21 13v2h-3v2h-3v2h-3v2h-3"/>
  </symbol>

  <!-- Service: Furniture / tables -->
  <symbol id="i-table" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 9h18"/>
    <path d="M3 9l1 -2h16l1 2"/>
    <path d="M5 9v11"/>
    <path d="M19 9v11"/>
    <path d="M5 15h14"/>
  </symbol>

  <!-- Service: Interior trim / millwork (chair-rail profile) -->
  <symbol id="i-trim" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 20l18 0"/>
    <path d="M3 18l18 0"/>
    <path d="M5 18l0 -5"/>
    <path d="M5 13l-2 -2l4 0"/>
    <path d="M3 11l4 -2l2 0"/>
    <path d="M9 9l12 0"/>
    <path d="M21 9l0 9"/>
  </symbol>

  <!-- Service: Outdoor living / pergola -->
  <symbol id="i-pergola" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 6l16 0"/>
    <path d="M3 9l18 0"/>
    <path d="M6 9l0 11"/>
    <path d="M18 9l0 11"/>
    <path d="M6 13l12 0"/>
    <path d="M8 6l0 -3"/>
    <path d="M12 6l0 -3"/>
    <path d="M16 6l0 -3"/>
  </symbol>

  <!-- Service: Commercial & Event Fabrication — branded display feature wall with logo plaque + spotlight -->
  <symbol id="i-fabrication" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Display wall outline -->
    <rect x="3" y="6" width="18" height="13" rx="1"/>
    <!-- Center logo plaque -->
    <rect x="9" y="9" width="6" height="4" rx="0.5"/>
    <!-- Three product shelves on right -->
    <path d="M16 9h3"/>
    <path d="M16 12h3"/>
    <path d="M16 15h3"/>
    <!-- Two product shelves on left -->
    <path d="M5 9h3"/>
    <path d="M5 15h3"/>
    <!-- Ground line + base risers -->
    <path d="M2 19h20"/>
    <path d="M5 19v2"/>
    <path d="M19 19v2"/>
  </symbol>

  <!-- Service: Repairs / staining (wrench) -->
  <symbol id="i-wrench" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14.7 6.3a4 4 0 0 0 -5.4 5.4l-6.3 6.3a1.5 1.5 0 0 0 2.1 2.1l6.3 -6.3a4 4 0 0 0 5.4 -5.4l-2.5 2.5l-1.6 -1.6z"/>
  </symbol>

  <!-- UI: arrow right -->
  <symbol id="i-arrow-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 12h14"/>
    <path d="M13 6l6 6 -6 6"/>
  </symbol>

  <!-- UI: phone -->
  <symbol id="i-phone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 4h3l2 5l-2.5 1.5a11 11 0 0 0 6 6l1.5 -2.5l5 2v3a2 2 0 0 1 -2 2a16 16 0 0 1 -15 -15a2 2 0 0 1 2 -2"/>
  </symbol>

  <!-- UI: mail -->
  <symbol id="i-mail" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="5" width="18" height="14" rx="2"/>
    <path d="M3 7l9 6l9 -6"/>
  </symbol>

  <!-- UI: pin -->
  <symbol id="i-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 21s-7 -7.5 -7 -12a7 7 0 0 1 14 0c0 4.5 -7 12 -7 12z"/>
    <circle cx="12" cy="9.5" r="2.5"/>
  </symbol>

  <!-- UI: menu / hamburger -->
  <symbol id="i-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h16"/>
  </symbol>

  <!-- Social: Instagram (matches existing canonical mark) -->
  <symbol id="i-instagram" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="2" width="20" height="20" rx="5"/>
    <path d="M16 11.37A4 4 0 1 1 12.63 8A4 4 0 0 1 16 11.37z"/>
    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
  </symbol>

  <!-- Social: Facebook -->
  <symbol id="i-facebook" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 2h-3a5 5 0 0 0 -5 5v3H7v4h3v8h4v-8h3l1 -4h-4V7a1 1 0 0 1 1 -1h3z"/>
  </symbol>

  <!-- Social: TikTok -->
  <symbol id="i-tiktok" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 12a4 4 0 1 0 4 4v-12a5 5 0 0 0 5 5"/>
  </symbol>

  <!-- Social: X / Twitter -->
  <symbol id="i-twitter" viewBox="0 0 24 24" fill="currentColor">
    <path d="M18.244 2.25h3.308l-7.227 8.26l8.502 11.24h-6.66l-5.214 -6.819l-5.967 6.819h-3.31l7.73 -8.835l-8.156 -10.665h6.828l4.713 6.231z"/>
  </symbol>

</svg>
